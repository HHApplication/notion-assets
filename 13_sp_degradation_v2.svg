<svg width="1400" height="440" viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">

<text x="350" y="22" text-anchor="middle" font-size="15" fill="#2C2C2A" font-weight="700">Plus tu restes dans [SHIFT+], plus tu deviens fou</text>

<!-- CASE 1: OK -->
<rect x="10" y="38" width="165" height="170" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="2"/>
<!-- Happy face -->
<circle cx="92" cy="100" r="30" fill="#EAF3DE" stroke="#639922" stroke-width="3"/>
<circle cx="80" cy="93" r="3" fill="#27500A"/>
<circle cx="104" cy="93" r="3" fill="#27500A"/>
<path d="M78 108 Q92 120 106 108" fill="none" stroke="#27500A" stroke-width="2" stroke-linecap="round"/>
<!-- Barre SP -->
<rect x="25" y="145" width="135" height="14" rx="4" fill="#ddd"/>
<rect x="25" y="145" width="120" height="14" rx="4" fill="#639922"/>
<text x="92" y="175" text-anchor="middle" font-size="13" fill="#27500A" font-weight="600">😊 Ça va</text>
<text x="92" y="192" text-anchor="middle" font-size="11" fill="#27500A">SP : 75%</text>

<!-- CASE 2: Hallucinations -->
<rect x="185" y="38" width="165" height="170" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="2"/>
<!-- Worried face -->
<circle cx="267" cy="100" r="30" fill="#FAEEDA" stroke="#EF9F27" stroke-width="3"/>
<circle cx="255" cy="93" r="3" fill="#633806"/>
<circle cx="279" cy="93" r="3" fill="#633806"/>
<path d="M255 112 Q267 106 279 112" fill="none" stroke="#633806" stroke-width="2" stroke-linecap="round"/>
<!-- Fantômes -->
<text x="220" y="78" font-size="18" opacity="0.4">👻</text>
<text x="300" y="90" font-size="14" opacity="0.3">👻</text>
<!-- Barre SP -->
<rect x="200" y="145" width="135" height="14" rx="4" fill="#ddd"/>
<rect x="200" y="145" width="55" height="14" rx="4" fill="#EF9F27"/>
<text x="267" y="175" text-anchor="middle" font-size="13" fill="#633806" font-weight="600">😰 Hallucinations</text>
<text x="267" y="192" text-anchor="middle" font-size="11" fill="#633806">SP : 40%</text>

<!-- CASE 3: Perte de contrôle -->
<rect x="360" y="38" width="165" height="170" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="2"/>
<!-- Panicked face -->
<circle cx="442" cy="100" r="30" fill="#FAECE7" stroke="#D85A30" stroke-width="3"/>
<circle cx="430" cy="90" r="4" fill="#4A1B0C"/>
<circle cx="454" cy="90" r="4" fill="#4A1B0C"/>
<ellipse cx="442" cy="112" rx="8" ry="5" fill="#4A1B0C"/>
<!-- Spirales autour (confusion) -->
<text x="408" y="82" font-size="16">🌀</text>
<text x="462" y="78" font-size="12">🌀</text>
<!-- Manette inversée -->
<text x="415" y="145" font-size="10" fill="#993C1D">← veut dire →</text>
<text x="415" y="158" font-size="10" fill="#993C1D">↑ veut dire ↓</text>
<text x="442" y="178" text-anchor="middle" font-size="13" fill="#993C1D" font-weight="600">😵 Contrôles inversés</text>
<text x="442" y="195" text-anchor="middle" font-size="11" fill="#993C1D">SP : 15%</text>

<!-- CASE 4: Catatonie -->
<rect x="535" y="38" width="155" height="170" rx="8" fill="#2C2C2A" stroke="#E24B4A" stroke-width="2.5"/>
<!-- Dark face consumed by shadow -->
<circle cx="612" cy="100" r="30" fill="#1a1a1a" stroke="#E24B4A" stroke-width="3"/>
<line cx="600" cy="93" x1="598" y1="90" x2="608" y2="96" stroke="#E24B4A" stroke-width="2"/>
<line cx="624" cy="93" x1="618" y1="96" x2="628" y2="90" stroke="#E24B4A" stroke-width="2"/>
<line x1="600" y1="110" x2="624" y2="110" stroke="#E24B4A" stroke-width="2"/>
<!-- Barre SP vide -->
<rect x="550" y="145" width="125" height="14" rx="4" fill="#501313"/>
<text x="612" y="178" text-anchor="middle" font-size="13" fill="#E24B4A" font-weight="700">☠️ CATATONIE</text>
<text x="612" y="195" text-anchor="middle" font-size="11" fill="#E24B4A">SP : 0%</text>
</svg>