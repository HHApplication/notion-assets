<text x="103" y="138" text-anchor="middle" font-size="10" fill="#993C1D">Fichés, débiteurs</text>

<rect x="177" y="100" width="127" height="52" rx="6" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
