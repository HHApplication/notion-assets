<text x="402" y="248" text-anchor="middle" font-size="10" fill="#993C1D">Réclamer</text>

<rect x="460" y="215" width="85" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="502" y="233" text-anchor="middle" font-size="11" fill="#26215C" font-weight="500">Ounech</text>
<text x="502" y="248" text-anchor="middle" font-size="10" fill="#534AB7">Interroger</text>

<rect x="555" y="215" width="85" height="40" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="597" y="233" text-anchor="middle" font-size="11" fill="#04342C" font-weight="500">Myt</text>
<text x="597" y="248" text-anchor="middle" font-size="10" fill="#0F6E56">Bénir</text>

<line x1="340" y1="255" x2="340" y2="280" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- Phase 3 -->
<rect x="40" y="280" width="600" height="30" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="300" text-anchor="middle" font-size="13" fill="#26215C" font-weight="600">Phase 3 — Dialogue tour par tour (contrôles manette)</text>

<!-- Boutons -->
<rect x="40" y="322" width="110" height="55" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<circle cx="65" cy="340" r="12" fill="#97C459" stroke="none"/>
<text x="65" y="344" text-anchor="middle" font-size="10" fill="#173404" font-weight="600">A</text>
<text x="105" y="340" text-anchor="middle" font-size="12" fill="#2C2C2A" font-weight="500">Parler</text>
<text x="95" y="365" text-anchor="middle" font-size="10" fill="#5F5E5A">Répondre</text>

<rect x="162" y="322" width="110" height="55" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<circle cx="187" cy="340" r="12" fill="#F09595" stroke="none"/>
<text x="187" y="344" text-anchor="middle" font-size="10" fill="#501313" font-weight="600">B</text>
<text x="227" y="340" text-anchor="middle" font-size="12" fill="#2C2C2A" font-weight="500">Annuler</text>
<text x="217" y="365" text-anchor="middle" font-size="10" fill="#5F5E5A">Quitter</text>

<rect x="284" y="322" width="110" height="55" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<circle cx="309" cy="340" r="12" fill="#85B7EB" stroke="none"/>
<text x="309" y="344" text-anchor="middle" font-size="10" fill="#042C53" font-weight="600">X</text>
<text x="349" y="340" text-anchor="middle" font-size="12" fill="#2C2C2A" font-weight="500">Spécial</text>
<text x="339" y="365" text-anchor="middle" font-size="10" fill="#5F5E5A">Action unique</text>

<rect x="406" y="322" width="110" height="55" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<circle cx="431" cy="340" r="12" fill="#FAC775" stroke="none"/>
<text x="431" y="344" text-anchor="middle" font-size="10" fill="#412402" font-weight="600">Y</text>
<text x="471" y="340" text-anchor="middle" font-size="12" fill="#2C2C2A" font-weight="500">Penser</text>
<text x="461" y="365" text-anchor="middle" font-size="10" fill="#5F5E5A">Réflexion</text>

<rect x="528" y="322" width="112" height="55" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.8"/>
<text x="584" y="340" text-anchor="middle" font-size="12" fill="#4B1528" font-weight="600">D-PAD</text>
<text x="584" y="365" text-anchor="middle" font-size="10" fill="#993556">Switch perso</text>

<!-- Icônes équipe -->
<rect x="40" y="392" width="600" height="55" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="340" y="412" text-anchor="middle" font-size="12" fill="#412402" font-weight="500">Les personnages non joués se manifestent via des icônes pendant le dialogue :</text>
<text x="150" y="435" text-anchor="middle" font-size="11" fill="#854F0B">💡 Suggestions/idées</text>
<text x="340" y="435" text-anchor="middle" font-size="11" fill="#854F0B">❗ Info pertinente</text>
<text x="530" y="435" text-anchor="middle" font-size="11" fill="#854F0B">🔄 Demande le relais</text>

<!-- Principe -->
<rect x="40" y="460" width="600" height="28" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
<text x="340" y="479" text-anchor="middle" font-size="12" fill="#27500A" font-weight="500" font-style="italic">Aucun personnage n'est inutile en dialogue. Le joueur peut élaborer des stratégies en temps réel.</text>
</svg>