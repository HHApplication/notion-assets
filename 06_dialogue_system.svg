<svg width="1360" height="1000" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">

<text x="340" y="22" text-anchor="middle" font-size="16" fill="#2C2C2A" font-weight="600">Système de dialogue — Le dialogue est du gameplay</text>
<text x="340" y="42" text-anchor="middle" font-size="12" fill="#888780">Tour par tour impliquant toute l'équipe</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/></marker></defs>

<!-- Phase 1 -->
<rect x="40" y="60" width="600" height="30" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
