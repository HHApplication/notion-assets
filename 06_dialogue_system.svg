<text x="240" y="138" text-anchor="middle" font-size="10" fill="#993556">Importance NPC</text>

<rect x="314" y="100" width="127" height="52" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="377" y="120" text-anchor="middle" font-size="11" fill="#412402" font-weight="500">Hetep (instinct)</text>
<text x="377" y="138" text-anchor="middle" font-size="10" fill="#854F0B">Louches (faillible)</text>

<rect x="451" y="100" width="90" height="52" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
