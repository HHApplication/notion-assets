<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="Arial, sans-serif">
  <defs>
    <style>
      .panel { fill: #FFF8E7; stroke: #2C1810; stroke-width: 3; rx: 12; }
      .num { font-size: 26px; font-weight: bold; fill: #C62828; }
      .label { font-size: 13px; font-weight: bold; fill: #2C1810; text-anchor: middle; }
      .body { stroke: #2C1810; stroke-width: 2.5; stroke-linecap: round; fill: none; }
    </style>
  </defs>
  <text x="600" y="28" font-size="22" font-weight="bold" fill="#7E57C2" text-anchor="middle">ESSENCES ÉMOTIONNELLES — TRACES DANS L'INVISIBLE</text>
  <text x="600" y="46" font-size="12" fill="#C62828" text-anchor="middle">⚠️ Extension GDD (à valider) — pas dans le Game Concept original</text>

  <!-- Panel 1: Event happens in real world -->
  <rect class="panel" x="15" y="55" width="380" height="340"/>
  <text class="num" x="30" y="85">1</text>
  <text x="205" y="83" font-size="14" font-weight="bold" fill="#1A237E">ÉVÉNEMENT DANS LE RÉEL</text>
  <!-- Two NPCs fighting in the street -->
  <rect x="18" y="100" width="374" height="180" fill="#E3F2FD"/>
  <rect x="18" y="260" width="374" height="50" fill="#E8D5B7"/>
  <!-- NPC 1 angry -->
  <circle cx="130" cy="200" r="20" fill="#A5D6A7" stroke="#2C1810" stroke-width="2"/>
  <text x="122" y="208" font-size="18">😡</text>
  <line class="body" x1="130" y1="220" x2="130" y2="265"/>
  <line class="body" x1="130" y1="238" x2="155" y2="225"/>
  <!-- NPC 2 scared -->
  <circle cx="270" cy="200" r="20" fill="#BBDEFB" stroke="#2C1810" stroke-width="2"/>
  <text x="262" y="208" font-size="18">😨</text>
  <line class="body" x1="270" y1="220" x2="270" y2="265"/>
  <!-- Fight impact -->
  <text x="190" y="210" font-size="22">💥</text>
  <!-- Crowd watching -->
  <text x="60" y="255" font-size="12">👤</text>
  <text x="330" y="255" font-size="12">👤</text>
  <text x="350" y="250" font-size="10">👤</text>
  <!-- Emotion particles rising (invisible) -->
  <circle cx="200" cy="160" r="4" fill="#F44336" opacity="0.3"/>
  <circle cx="180" cy="145" r="3" fill="#FF9800" opacity="0.2"/>
  <circle cx="220" cy="140" r="5" fill="#9C27B0" opacity="0.2"/>
  <circle cx="195" cy="130" r="3" fill="#2196F3" opacity="0.2"/>
  <text x="230" y="135" font-size="8" fill="#7E57C2" opacity="0.5">↑ traces émotionnelles</text>
  <text class="label" x="205" y="370">Bagarre → émotions marquent le lieu</text>

  <!-- Panel 2: Same place with SHIFT+ shows essences -->
  <rect class="panel" x="410" y="55" width="380" height="340"/>
  <text class="num" x="425" y="85">2</text>
  <text x="600" y="83" font-size="14" font-weight="bold" fill="#7E57C2">VU AVEC [SHIFT+]</text>
  <!-- Same street but with ethereal overlay -->
  <rect x="413" y="100" width="374" height="180" fill="#EDE7F6"/>
  <rect x="413" y="260" width="374" height="50" fill="#E8D5B7"/>
  <!-- No NPCs anymore, but essences floating -->
  <circle cx="500" cy="180" r="18" fill="#F44336" opacity="0.4" stroke="#C62828" stroke-width="1.5"/>
  <text x="490" y="185" font-size="10" fill="#B71C1C" font-weight="bold">Colère</text>
  <circle cx="580" cy="160" r="15" fill="#FF9800" opacity="0.4" stroke="#E65100" stroke-width="1.5"/>
  <text x="568" y="165" font-size="9" fill="#E65100" font-weight="bold">Peur</text>
  <circle cx="650" cy="190" r="20" fill="#9C27B0" opacity="0.3" stroke="#6A1B9A" stroke-width="1.5"/>
  <text x="630" y="195" font-size="10" fill="#6A1B9A" font-weight="bold">Trahison</text>
  <circle cx="720" cy="170" r="14" fill="#2196F3" opacity="0.3" stroke="#1565C0" stroke-width="1.5"/>
  <text x="704" y="175" font-size="9" fill="#1565C0" font-weight="bold">Courage</text>
  <!-- Character with SHIFT+ seeing this -->
  <circle cx="470" cy="240" r="18" fill="#FFD54F" stroke="#2C1810" stroke-width="2"/>
  <text x="462" y="248" font-size="16">😮</text>
  <!-- SHIFT+ eye -->
  <circle cx="480" cy="235" r="4" fill="#00BCD4" opacity="0.5"/>
  <text class="label" x="600" y="370">Les essences flottent dans l'invisible</text>

  <!-- Panel 3: Collect or danger -->
  <rect class="panel" x="805" y="55" width="380" height="340"/>
  <text class="num" x="820" y="85">3</text>
  <text x="995" y="83" font-size="14" font-weight="bold" fill="#1A237E">RÉCOLTER OU AFFRONTER</text>
  <!-- Option A: Collect -->
  <rect x="830" y="110" width="160" height="130" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="845" y="132" font-size="11" fill="#2E7D32" font-weight="bold">🧪 RÉCOLTER</text>
  <!-- Character collecting essence -->
  <circle cx="880" cy="180" r="16" fill="#FFD54F" stroke="#2C1810" stroke-width="2"/>
  <text x="873" y="187" font-size="14">🤩</text>
  <circle cx="940" cy="170" r="12" fill="#2196F3" opacity="0.4"/>
  <text x="930" y="175" font-size="8" fill="#1565C0">Courage</text>
  <text x="845" y="225" font-size="9" fill="#2E7D32">→ Items, compétences</text>
  <!-- Option B: Entity spawns -->
  <rect x="1005" y="110" width="160" height="130" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="1020" y="132" font-size="11" fill="#B71C1C" font-weight="bold">👹 ENTITÉ NÉE</text>
  <!-- Dark entity -->
  <circle cx="1080" cy="180" r="20" fill="#37474F" opacity="0.7"/>
  <text x="1072" y="188" font-size="18">😈</text>
  <!-- Entity can possess body -->
  <text x="1020" y="225" font-size="9" fill="#B71C1C">→ Peut posséder un corps</text>
  <!-- Warning box -->
  <rect x="830" y="270" width="335" height="90" rx="8" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="850" y="292" font-size="11" fill="#4A148C" font-weight="bold">🔮 Principe :</text>
  <text x="850" y="312" font-size="10" fill="#4A148C">Les émotions fortes marquent l'environnement</text>
  <text x="850" y="332" font-size="10" fill="#4A148C">Les esprits morts en jouent pour manipuler</text>
  <text x="850" y="352" font-size="10" fill="#4A148C">les vivants (biais, émotions exacerbées)</text>
  <text class="label" x="995" y="380">ÉCHOS DU PASSÉ</text>
</svg>