<svg width="1360" height="600" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">
<text x="340" y="20" text-anchor="middle" font-size="14" fill="#2C2C2A" font-weight="600">Storyboard — Essences émotionnelles : les lieux gardent des traces</text>

<!-- Case 1: Scène de bagarre (monde sensible) -->
<rect x="20" y="40" width="200" height="120" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.2"/>
<text x="30" y="57" font-size="10" fill="#412402" font-weight="500">Hier — une bagarre ici</text>
<circle cx="80" cy="100" r="12" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
<text x="80" y="104" text-anchor="middle" font-size="10">🤜</text>
<circle cx="140" cy="100" r="12" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
<text x="140" y="104" text-anchor="middle" font-size="10">🤕</text>
<text x="110" y="90" text-anchor="middle" font-size="14">⚡</text>
<text x="120" y="145" text-anchor="middle" font-size="9" fill="#854F0B">Violence publique dans la rue.</text>
<text x="120" y="155" text-anchor="middle" font-size="9" fill="#854F0B">Témoins. Émotion forte.</text>

<!-- Flèche -->
<text x="235" y="100" text-anchor="middle" font-size="16" fill="#888780">→</text>
<text x="235" y="118" text-anchor="middle" font-size="9" fill="#888780">Lendemain</text>

<!-- Case 2: Même lieu, monde invisible via SHIFT+ -->
<rect x="255" y="40" width="200" height="120" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="265" y="57" font-size="10" fill="#26215C" font-weight="500">Aujourd'hui — [SHIFT+] actif</text>
<!-- Personnage qui scanne -->
<circle cx="300" cy="100" r="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="300" y="104" text-anchor="middle" font-size="11" fill="#04342C" font-weight="500">M</text>
<line x1="300" y1="114" x2="300" y2="140" stroke="#1D9E75" stroke-width="1.5"/>
<!-- Essences flottantes -->
<circle cx="360" cy="80" r="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.7"/>
<text x="360" y="84" text-anchor="middle" font-size="8" fill="#E24B4A">😡</text>
<circle cx="390" cy="100" r="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.6"/>
<text x="390" y="104" text-anchor="middle" font-size="8" fill="#EF9F27">💪</text>
<circle cx="410" cy="75" r="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.5"/>
<text x="410" y="79" text-anchor="middle" font-size="8" fill="#534AB7">🗡️</text>
<circle cx="430" cy="110" r="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.4"/>
<text x="430" y="114" text-anchor="middle" font-size="8" fill="#E24B4A">😈</text>
<text x="355" y="140" text-anchor="middle" font-size="9" fill="#534AB7">Essences : colère, courage,</text>
<text x="355" y="152" text-anchor="middle" font-size="9" fill="#534AB7">trahison, vengeance</text>

<!-- Flèche -->
<text x="470" y="100" text-anchor="middle" font-size="16" fill="#888780">→</text>

<!-- Case 3: Entité qui naît -->
<rect x="485" y="40" width="175" height="120" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.2"/>
<text x="495" y="57" font-size="10" fill="#501313" font-weight="500">Si les essences s'accumulent</text>
<!-- Entité formée -->
<circle cx="570" cy="95" r="22" fill="#2C2C2A" stroke="#E24B4A" stroke-width="2" stroke-dasharray="4 3"/>
<text x="570" y="100" text-anchor="middle" font-size="16" fill="#E24B4A">👹</text>
<text x="572" y="130" text-anchor="middle" font-size="9" fill="#501313" font-weight="500">Entité née des émotions</text>
<text x="572" y="142" text-anchor="middle" font-size="9" fill="#501313">Peut posséder un NPC</text>
<text x="572" y="154" text-anchor="middle" font-size="9" fill="#791F1F">→ Combat ou exorcisme (Myt)</text>

<!-- Explications en bas -->
<rect x="20" y="175" width="640" height="100" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="340" y="195" text-anchor="middle" font-size="12" fill="#04342C" font-weight="600">Comment ça fonctionne</text>

<text x="40" y="218" font-size="10" fill="#0F6E56">1. Un événement émotionnel fort se produit dans le monde sensible (bagarre, cérémonie, mort)</text>
<text x="40" y="236" font-size="10" fill="#0F6E56">2. Des essences émotionnelles persistent dans le monde invisible (visibles via [SHIFT+] ou via Myt/Hesat)</text>
<text x="40" y="254" font-size="10" fill="#0F6E56">3. Le joueur peut les récolter (crafting, XP) ou les ignorer</text>
<text x="40" y="272" font-size="10" fill="#E24B4A" font-weight="500">4. Si accumulées → naissent des entités qui peuvent posséder un corps physique → combat ou exorcisme</text>
</svg>