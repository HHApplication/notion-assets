<svg width="1400" height="500" viewBox="0 0 700 250" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">

<text x="350" y="22" text-anchor="middle" font-size="15" fill="#2C2C2A" font-weight="700">Se faire repérer par une caméra → alerte immédiate via [SHIFT+]</text>

<!-- CASE 1: Hetep se faufile -->
<rect x="10" y="38" width="220" height="200" rx="8" fill="#FFF8F0" stroke="#B4B2A9" stroke-width="1.5"/>
<text x="120" y="58" text-anchor="middle" font-size="12" fill="#5F5E5A" font-weight="500">1. Hetep se faufile…</text>

<!-- Hetep qui rampe -->
<circle cx="80" cy="140" r="22" fill="#FAEEDA" stroke="#EF9F27" stroke-width="2.5"/>
<text x="80" y="148" text-anchor="middle" font-size="16" fill="#854F0B" font-weight="700">H</text>
<line x1="80" y1="162" x2="80" y2="190" stroke="#EF9F27" stroke-width="3"/>
<line x1="62" y1="176" x2="98" y2="176" stroke="#EF9F27" stroke-width="3"/>
<!-- Yeux qui guettent -->
<text x="80" y="120" text-anchor="middle" font-size="14">👀</text>

<!-- Objet convoité -->
<rect x="160" y="90" width="50" height="40" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
<text x="185" y="115" text-anchor="middle" font-size="18">📦</text>
<text x="185" y="150" text-anchor="middle" font-size="9" fill="#854F0B">trésor</text>

<!-- CASE 2: REPÉRÉ ! -->
<rect x="240" y="38" width="220" height="200" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="2.5"/>
<text x="350" y="58" text-anchor="middle" font-size="14" fill="#E24B4A" font-weight="700">2. REPÉRÉ !</text>

<!-- Caméra en gros -->
<rect x="340" y="72" width="60" height="35" rx="6" fill="#2C2C2A" stroke="#E24B4A" stroke-width="2"/>
<circle cx="370" cy="90" r="10" fill="#E24B4A"/>
<circle cx="370" cy="90" r="5" fill="#fff"/>

<!-- Faisceau rouge -->
<polygon points="340,95 260,145 260,125" fill="#E24B4A" opacity="0.15" stroke="#E24B4A" stroke-width="0.5"/>

<!-- Hetep pris dedans -->
<circle cx="290" cy="140" r="20" fill="#FAEEDA" stroke="#E24B4A" stroke-width="3"/>
<text x="290" y="148" text-anchor="middle" font-size="14" fill="#854F0B" font-weight="700">H</text>
<text x="290" y="125" text-anchor="middle" font-size="14">😱</text>

<!-- Alerte -->
<text x="350" y="160" text-anchor="middle" font-size="26" fill="#E24B4A">🚨</text>
<text x="350" y="185" text-anchor="middle" font-size="12" fill="#A32D2D" font-weight="600">Alerte [SHIFT+]</text>
<text x="350" y="200" text-anchor="middle" font-size="10" fill="#791F1F">Tout le réseau</text>
<text x="350" y="212" text-anchor="middle" font-size="10" fill="#791F1F">est prévenu</text>

<!-- CASE 3: POLICE -->
<rect x="470" y="38" width="220" height="200" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="2"/>
<text x="580" y="58" text-anchor="middle" font-size="12" fill="#4A1B0C" font-weight="500">3. La police arrive</text>

<!-- 3 flics qui rappliquent -->
<circle cx="510" cy="120" r="18" fill="#FAECE7" stroke="#D85A30" stroke-width="2"/>
<text x="510" y="127" text-anchor="middle" font-size="14">👮</text>
<circle cx="555" cy="115" r="18" fill="#FAECE7" stroke="#D85A30" stroke-width="2"/>
<text x="555" y="122" text-anchor="middle" font-size="14">👮</text>
<circle cx="600" cy="125" r="18" fill="#FAECE7" stroke="#D85A30" stroke-width="2"/>
<text x="600" y="132" text-anchor="middle" font-size="14">👮</text>

<!-- Chien cyborg -->
<text x="640" y="145" font-size="22">🐕</text>
<text x="650" y="132" font-size="10" fill="#993C1D">cyborg</text>

<!-- Hetep qui court -->
<circle cx="520" cy="180" r="14" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
<text x="520" y="187" text-anchor="middle" font-size="11" fill="#854F0B">H</text>
<text x="500" y="185" font-size="12">💨</text>

<text x="580" y="215" text-anchor="middle" font-size="12" fill="#4A1B0C" font-weight="600">Combat forcé ou fuite</text>

<!-- Moral de l'histoire -->
<text x="350" y="248" text-anchor="middle" font-size="13" fill="#2C2C2A" font-weight="600">💡 Observer les alentours AVANT d'agir. Ou envoyer Kahay pirater la caméra d'abord.</text>
</svg>