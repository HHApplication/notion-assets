<svg width="1360" height="1440" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">

<!-- CASE 1 : Scan pré-dialogue -->
<rect x="20" y="20" width="310" height="200" rx="6" fill="#FFF8F0" stroke="#B4B2A9" stroke-width="1.5"/>
<text x="30" y="38" font-size="12" fill="#5F5E5A" font-weight="500">Case 1 — Scan pré-dialogue</text>

<!-- Kahay silhouette -->
<circle cx="100" cy="120" r="18" fill="#FBEAF0" stroke="#D4537E" stroke-width="1.5"/>
<text x="100" y="125" text-anchor="middle" font-size="14" fill="#D4537E" font-weight="600">K</text>
<line x1="100" y1="138" x2="100" y2="175" stroke="#D4537E" stroke-width="1.5"/>
<line x1="85" y1="155" x2="115" y2="155" stroke="#D4537E" stroke-width="1.5"/>
<line x1="90" y1="175" x2="100" y2="198" stroke="#D4537E" stroke-width="1.5"/>
<line x1="110" y1="175" x2="100" y2="198" stroke="#D4537E" stroke-width="1.5"/>

<!-- Scan overlay -->
<rect x="140" y="75" width="175" height="85" rx="6" fill="none" stroke="#D4537E" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="227" y="95" text-anchor="middle" font-size="11" fill="#D4537E" font-weight="500">[SHIFT+] scan actif</text>
<text x="227" y="115" text-anchor="middle" font-size="11" fill="#5F5E5A">NPC détecté : intérêt moyen</text>
<text x="227" y="135" text-anchor="middle" font-size="11" fill="#5F5E5A">Profil : civil, aviné</text>

<!-- NPC silhouette -->
<circle cx="260" cy="120" r="18" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
<text x="260" y="125" text-anchor="middle" font-size="14" fill="#5F5E5A">?</text>
<line x1="260" y1="138" x2="260" y2="175" stroke="#888780" stroke-width="1.5"/>
<line x1="245" y1="155" x2="275" y2="155" stroke="#888780" stroke-width="1.5"/>

<!-- CASE 2 : Approche charme -->
<rect x="350" y="20" width="310" height="200" rx="6" fill="#FFF8F0" stroke="#B4B2A9" stroke-width="1.5"/>
<text x="360" y="38" font-size="12" fill="#5F5E5A" font-weight="500">Case 2 — Approche par le charme</text>

<circle cx="420" cy="120" r="18" fill="#FBEAF0" stroke="#D4537E" stroke-width="1.5"/>
<text x="420" y="125" text-anchor="middle" font-size="14" fill="#D4537E" font-weight="600">K</text>
<line x1="420" y1="138" x2="420" y2="175" stroke="#D4537E" stroke-width="1.5"/>

<!-- Bulle Kahay -->
<rect x="450" y="70" width="195" height="50" rx="12" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
<text x="547" y="90" text-anchor="middle" font-size="11" fill="#72243E">« Excusez-moi, vous</text>
<text x="547" y="107" text-anchor="middle" font-size="11" fill="#72243E">sauriez où se trouve… »</text>

<!-- NPC -->
<circle cx="590" cy="120" r="18" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.5"/>
<text x="590" y="125" text-anchor="middle" font-size="14" fill="#E24B4A" font-weight="600">!</text>

<!-- Bulle NPC -->
<rect x="480" y="148" width="175" height="45" rx="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text x="567" y="166" text-anchor="middle" font-size="11" fill="#A32D2D">« Hé ma jolie, et si</text>
<text x="567" y="183" text-anchor="middle" font-size="11" fill="#A32D2D">on allait plutôt… »</text>

<!-- CASE 3 : Options joueur -->
<rect x="20" y="240" width="640" height="200" rx="6" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="1.5"/>
<text x="30" y="258" font-size="12" fill="#5F5E5A" font-weight="500">Case 3 — Choix du joueur (tour par tour)</text>

<!-- Option A -->
<rect x="40" y="275" width="138" height="70" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="109" y="298" text-anchor="middle" font-size="13" fill="#2C2C2A" font-weight="500">A : Ignorer</text>
<text x="109" y="316" text-anchor="middle" font-size="11" fill="#5F5E5A">Ne pas relever</text>
<text x="109" y="332" text-anchor="middle" font-size="11" fill="#5F5E5A">Continuer le dialogue</text>

<!-- Option Y -->
<rect x="193" y="275" width="138" height="70" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
<text x="262" y="298" text-anchor="middle" font-size="13" fill="#72243E" font-weight="500">Y : Penser</text>
<text x="262" y="316" text-anchor="middle" font-size="11" fill="#993556">Insulte interne</text>
<text x="262" y="332" text-anchor="middle" font-size="11" fill="#993556">NPC ne l'entend pas</text>

<!-- Option A verbal -->
<rect x="346" y="275" width="138" height="70" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="415" y="298" text-anchor="middle" font-size="13" fill="#4A1B0C" font-weight="500">A : Insulter</text>
<text x="415" y="316" text-anchor="middle" font-size="11" fill="#993C1D">Verbalement</text>
<text x="415" y="332" text-anchor="middle" font-size="11" fill="#993C1D">NPC peut réagir !</text>

<!-- Option D-PAD -->
<rect x="499" y="275" width="148" height="70" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="573" y="298" text-anchor="middle" font-size="13" fill="#042C53" font-weight="500">D-PAD → Anubis</text>
<text x="573" y="316" text-anchor="middle" font-size="11" fill="#185FA5">Switch personnage</text>
<text x="573" y="332" text-anchor="middle" font-size="11" fill="#185FA5">Manière forte</text>

<!-- Hetep alerte -->
<rect x="40" y="365" width="607" height="55" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="60" y="388" font-size="13" fill="#412402" font-weight="500">⚠ Hetep signale :</text>
<text x="60" y="408" font-size="11" fill="#854F0B">« Ce type ment. J'ai senti quelque chose. » — icône D-PAD clignote — le joueur peut le faire intervenir</text>

<!-- CASE 4 : Anubis -->
<rect x="20" y="460" width="310" height="240" rx="6" fill="#F0F6FC" stroke="#B4B2A9" stroke-width="1.5"/>
<text x="30" y="478" font-size="12" fill="#5F5E5A" font-weight="500">Case 4 — Si le joueur choisit Anubis</text>

<circle cx="100" cy="560" r="24" fill="#E6F1FB" stroke="#378ADD" stroke-width="2"/>
<text x="100" y="565" text-anchor="middle" font-size="16" fill="#185FA5" font-weight="600">A</text>
<line x1="100" y1="584" x2="100" y2="635" stroke="#378ADD" stroke-width="2"/>
<line x1="75" y1="605" x2="125" y2="605" stroke="#378ADD" stroke-width="2"/>
<line x1="88" y1="635" x2="100" y2="660" stroke="#378ADD" stroke-width="2"/>
<line x1="112" y1="635" x2="100" y2="660" stroke="#378ADD" stroke-width="2"/>

<circle cx="230" cy="570" r="16" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1" stroke-dasharray="3 2"/>
<text x="230" y="575" text-anchor="middle" font-size="12" fill="#E24B4A">!</text>

<rect x="140" y="495" width="175" height="45" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="227" y="514" text-anchor="middle" font-size="11" fill="#0C447C">« Répète un peu</text>
<text x="227" y="530" text-anchor="middle" font-size="11" fill="#0C447C">pour voir… »</text>

<rect x="190" y="610" width="130" height="30" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text x="255" y="630" text-anchor="middle" font-size="11" fill="#A32D2D">NPC intimidé : fuit</text>

<circle cx="60" cy="660" r="12" fill="#FBEAF0" stroke="#D4537E" stroke-width="1" opacity="0.4"/>
<text x="80" y="682" font-size="10" fill="#D4537E" opacity="0.6">Kahay en retrait</text>

<!-- CASE 5 : Stratégie -->
<rect x="350" y="460" width="310" height="240" rx="6" fill="#FEFBF3" stroke="#B4B2A9" stroke-width="1.5"/>
<text x="360" y="478" font-size="12" fill="#5F5E5A" font-weight="500">Case 5 — Stratégie combinée</text>

<circle cx="420" cy="550" r="16" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
<text x="420" y="555" text-anchor="middle" font-size="14" fill="#854F0B" font-weight="500">H</text>

<rect x="445" y="510" width="195" height="45" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="542" y="528" text-anchor="middle" font-size="11" fill="#633806">Hetep cuisine le NPC</text>
<text x="542" y="545" text-anchor="middle" font-size="11" fill="#854F0B">(A : flatterie obséquieuse)</text>

<circle cx="410" cy="630" r="14" fill="#FBEAF0" stroke="#D4537E" stroke-width="1" stroke-dasharray="3 2"/>
<text x="410" y="635" text-anchor="middle" font-size="12" fill="#D4537E">K</text>

<rect x="440" y="600" width="195" height="65" rx="8" fill="none" stroke="#D4537E" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="537" y="618" text-anchor="middle" font-size="11" fill="#993556">[SHIFT+] scan en cours…</text>
<text x="537" y="636" text-anchor="middle" font-size="11" fill="#993556">Double niveau d'info obtenu</text>
<text x="537" y="654" text-anchor="middle" font-size="11" fill="#993556">→ Confrontation possible</text>

<text x="505" y="695" text-anchor="middle" font-size="12" fill="#2C2C2A" font-weight="500" font-style="italic">Aucun personnage n'est inutile.</text>
</svg>