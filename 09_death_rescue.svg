<svg width="1360" height="1000" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">
<text x="340" y="20" text-anchor="middle" font-size="14" fill="#2C2C2A" font-weight="600">Storyboard — Mort d'un personnage et sauvetage de l'âme</text>

<!-- Case 1: Combat, un perso tombe -->
<rect x="20" y="38" width="200" height="140" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.5"/>
<text x="30" y="55" font-size="10" fill="#501313" font-weight="500">Case 1 — 0 HP en combat</text>
<circle cx="80" cy="100" r="16" fill="#FCEBEB" stroke="#E24B4A" stroke-width="2"/>
<text x="80" y="104" text-anchor="middle" font-size="12" fill="#A32D2D" font-weight="600">H</text>
<line x1="80" y1="116" x2="80" y2="145" stroke="#E24B4A" stroke-width="1.5"/>
<line x1="60" y1="145" x2="100" y2="145" stroke="#E24B4A" stroke-width="1.5"/>
<text x="80" y="168" text-anchor="middle" font-size="9" fill="#A32D2D">Hetep tombe</text>
<rect x="115" y="80" width="90" height="22" rx="4" fill="#FCEBEB" stroke="none"/>
<text x="160" y="95" text-anchor="middle" font-size="10" fill="#E24B4A" font-weight="600">HP: ████░░ → 0</text>
<text x="160" y="112" text-anchor="middle" font-size="9" fill="#A32D2D">Corps périclite</text>

<!-- Case 2: Ka devient Sahu -->
<rect x="240" y="38" width="200" height="140" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
<text x="250" y="55" font-size="10" fill="#042C53" font-weight="500">Case 2 — Ka → Sahu (fantôme)</text>
<!-- Corps au sol -->
<circle cx="290" cy="135" r="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5" opacity="0.4"/>
<text x="290" y="139" text-anchor="middle" font-size="9" fill="#888780">H</text>
<text x="290" y="160" font-size="8" fill="#888780" font-style="italic">corps au sol</text>
<!-- Fantôme qui aide -->
<circle cx="360" cy="100" r="14" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="360" y="104" text-anchor="middle" font-size="11" fill="#378ADD" font-weight="500">👻</text>
<text x="360" y="130" text-anchor="middle" font-size="9" fill="#185FA5">Sahu aide encore</text>
<text x="360" y="142" text-anchor="middle" font-size="9" fill="#185FA5">temporairement</text>

<!-- Case 3: Ba s'enfuit -->
<rect x="460" y="38" width="200" height="140" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="470" y="55" font-size="10" fill="#26215C" font-weight="500">Case 3 — Ba fuit vers l'inframonde</text>
<text x="560" y="85" text-anchor="middle" font-size="20">🦅</text>
<line x1="560" y1="95" x2="560" y2="125" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 2"/>
<text x="560" y="95" text-anchor="middle" font-size="9" fill="#534AB7">↑ Ba s'envole</text>
<rect x="480" y="130" width="160" height="35" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="560" y="148" text-anchor="middle" font-size="10" fill="#3C3489" font-weight="500">⏱️ Délai limité pour</text>
<text x="560" y="161" text-anchor="middle" font-size="10" fill="#3C3489">refusionner Ka + Ba !</text>

<!-- Case 4: Transporter le corps -->
<rect x="20" y="195" width="310" height="130" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
<text x="30" y="212" font-size="10" fill="#412402" font-weight="500">Case 4 — Si le délai est dépassé : transporter le corps</text>
<!-- Antef porte Hetep -->
<circle cx="80" cy="270" r="16" fill="#FAECE7" stroke="#D85A30" stroke-width="2"/>
<text x="80" y="274" text-anchor="middle" font-size="12" fill="#4A1B0C" font-weight="600">A</text>
<line x1="80" y1="286" x2="80" y2="310" stroke="#D85A30" stroke-width="2"/>
<!-- Corps sur le dos -->
<circle cx="95" cy="262" r="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5" opacity="0.5"/>
<text x="95" y="265" text-anchor="middle" font-size="7" fill="#888780">H</text>
<text x="160" y="255" font-size="10" fill="#854F0B">Antef charge Hetep sur</text>
<text x="160" y="270" font-size="10" fill="#854F0B">son dos / véhicule / drone</text>
<rect x="140" y="285" width="170" height="25" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="225" y="302" text-anchor="middle" font-size="10" fill="#633806" font-weight="500">Attendre la nuit pour sauver Ba</text>

<!-- Case 5: L'inframonde -->
<rect x="350" y="195" width="310" height="130" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="360" y="212" font-size="10" fill="#26215C" font-weight="500">Case 5 — Nuit : voyage dans l'inframonde</text>
<!-- Ba oiseau dans un tunnel -->
<text x="420" y="260" text-anchor="middle" font-size="18">🦅</text>
<!-- Ennemis spirites -->
<circle cx="490" cy="260" r="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1" stroke-dasharray="3 2"/>
<text x="490" y="264" text-anchor="middle" font-size="9" fill="#E24B4A">👻</text>
<circle cx="530" cy="250" r="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1" stroke-dasharray="3 2"/>
<text x="530" y="254" text-anchor="middle" font-size="9" fill="#E24B4A">👻</text>
<circle cx="570" cy="270" r="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1" stroke-dasharray="3 2"/>
<text x="570" y="274" text-anchor="middle" font-size="9" fill="#E24B4A">👻</text>

<rect x="480" y="285" width="170" height="30" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text x="565" y="300" text-anchor="middle" font-size="9" fill="#3C3489">Parcours d'obstacles +</text>
<text x="565" y="312" text-anchor="middle" font-size="9" fill="#3C3489">ennemis spirites</text>

<!-- Case 6: Antichambre -->
<rect x="20" y="340" width="640" height="90" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
<text x="30" y="357" font-size="10" fill="#2C2C2A" font-weight="500">Case 6 — L'Antichambre du Grand Tribunal (FERMÉ)</text>

<!-- Âmes qui attendent -->
<circle cx="120" cy="390" r="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="2 2"/>
<text x="120" y="394" text-anchor="middle" font-size="9">😡</text>
<circle cx="160" cy="385" r="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="2 2"/>
<text x="160" y="389" text-anchor="middle" font-size="9">😤</text>
<circle cx="200" cy="395" r="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="2 2"/>
<text x="200" y="399" text-anchor="middle" font-size="9">🤬</text>
<circle cx="240" cy="382" r="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="2 2"/>
<text x="240" y="386" text-anchor="middle" font-size="9">😵</text>

<!-- Ba de Hetep dans la foule -->
<circle cx="300" cy="390" r="14" fill="#FAEEDA" stroke="#EF9F27" stroke-width="2"/>
<text x="300" y="394" text-anchor="middle" font-size="11" fill="#854F0B" font-weight="600">Ba</text>
<text x="300" y="412" font-size="8" fill="#854F0B">Hetep</text>

<!-- Texte -->
<text x="430" y="375" font-size="10" fill="#2C2C2A">Le Grand Tribunal d'Osiris est fermé.</text>
<text x="430" y="390" font-size="10" fill="#2C2C2A">Les âmes se massent, irritées, enragées.</text>
<text x="430" y="405" font-size="10" fill="#E24B4A" font-weight="500">Plus on attend → plus l'âme est sauvage.</text>
<text x="430" y="420" font-size="10" fill="#E24B4A">Plus difficile à ramener.</text>

<!-- Conclusion -->
<text x="340" y="460" text-anchor="middle" font-size="12" fill="#2C2C2A" font-weight="500" font-style="italic">Ne pas confondre avec la catatonie (0 SP = Shuyet) → autre mécanisme, autre intervention.</text>
</svg>