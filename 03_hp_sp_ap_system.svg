<svg width="1360" height="1200" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">

<text x="340" y="22" text-anchor="middle" font-size="16" fill="#2C2C2A" font-weight="600">Système HP / SP / AP — Les trois jauges vitales</text>
<text x="340" y="42" text-anchor="middle" font-size="12" fill="#888780">Composantes de l'être → paramètres de gameplay</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/></marker></defs>

<!-- HP -->
<rect x="30" y="65" width="190" height="85" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
<text x="125" y="88" text-anchor="middle" font-size="15" fill="#4A1B0C" font-weight="600">HP — Health Points</text>
<text x="125" y="108" text-anchor="middle" font-size="11" fill="#993C1D">Source : Ankh → Hat (cœur)</text>
<text x="125" y="125" text-anchor="middle" font-size="11" fill="#993C1D">Support : corps physique (Khat)</text>
<text x="125" y="142" text-anchor="middle" font-size="11" fill="#712B13" font-weight="500">Drainé par : COMBAT</text>

<!-- SP -->
<rect x="245" y="65" width="190" height="85" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text x="340" y="88" text-anchor="middle" font-size="15" fill="#042C53" font-weight="600">SP — Sanity Points</text>
<text x="340" y="108" text-anchor="middle" font-size="11" fill="#185FA5">Source : Ab (cœur psychique)</text>
<text x="340" y="125" text-anchor="middle" font-size="11" fill="#185FA5">Support : santé mentale</text>
<text x="340" y="142" text-anchor="middle" font-size="11" fill="#0C447C" font-weight="500">Drainé par : [SHIFT+]</text>

<!-- AP -->
<rect x="460" y="65" width="190" height="85" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="555" y="88" text-anchor="middle" font-size="15" fill="#26215C" font-weight="600">AP — Action Points</text>
<text x="555" y="108" text-anchor="middle" font-size="11" fill="#534AB7">Source : Sekhem (puissance)</text>
<text x="555" y="125" text-anchor="middle" font-size="11" fill="#534AB7">Support : jauge offensive</text>
<text x="555" y="142" text-anchor="middle" font-size="11" fill="#3C3489" font-weight="500">Chargé par : COMBAT</text>

<!-- Flèches vers conséquences -->
<line x1="125" y1="150" x2="125" y2="195" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<line x1="340" y1="150" x2="340" y2="195" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<line x1="555" y1="150" x2="555" y2="195" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<text x="125" y="185" text-anchor="middle" font-size="12" fill="#D85A30" font-weight="600">= 0</text>
<text x="340" y="185" text-anchor="middle" font-size="12" fill="#378ADD" font-weight="600">= 0</text>
<text x="555" y="185" text-anchor="middle" font-size="12" fill="#534AB7" font-weight="600">= 100%</text>

<!-- MORT -->
<rect x="30" y="200" width="190" height="80" rx="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
<text x="125" y="222" text-anchor="middle" font-size="14" fill="#501313" font-weight="600">MORT</text>
<text x="125" y="242" text-anchor="middle" font-size="11" fill="#A32D2D">Ka → Sahu (fantôme)</text>
<text x="125" y="258" text-anchor="middle" font-size="11" fill="#A32D2D">Ba éjecté → inframonde</text>
<text x="125" y="274" text-anchor="middle" font-size="11" fill="#A32D2D">Corps à transporter</text>

<!-- CATATONIE -->
<rect x="245" y="200" width="190" height="80" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text x="340" y="222" text-anchor="middle" font-size="14" fill="#042C53" font-weight="600">CATATONIE</text>
<text x="340" y="242" text-anchor="middle" font-size="11" fill="#185FA5">Shuyet (ombre) envahit</text>
<text x="340" y="258" text-anchor="middle" font-size="11" fill="#185FA5">Prisonnier mental</text>
<text x="340" y="274" text-anchor="middle" font-size="11" fill="#185FA5">Défense/volonté ↓↓</text>

<!-- SUPER ATTAQUE -->
<rect x="460" y="200" width="190" height="80" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text x="555" y="222" text-anchor="middle" font-size="14" fill="#26215C" font-weight="600">SUPER ATTAQUE</text>
<text x="555" y="242" text-anchor="middle" font-size="11" fill="#534AB7">Via avatar numérique</text>
<text x="555" y="258" text-anchor="middle" font-size="11" fill="#534AB7">Monde du Ba uniquement</text>
<text x="555" y="274" text-anchor="middle" font-size="11" fill="#534AB7">Corrélé au personnage</text>

<!-- Résolution mort -->
<line x1="125" y1="280" x2="125" y2="315" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<rect x="15" y="315" width="220" height="160" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="125" y="338" text-anchor="middle" font-size="13" fill="#04342C" font-weight="500">Résolution mort</text>
<rect x="30" y="350" width="190" height="22" rx="4" fill="#9FE1CB" stroke="none"/>
<text x="125" y="366" text-anchor="middle" font-size="11" fill="#04342C">1. Refusion Ka+Ba (immédiat)</text>
<rect x="30" y="378" width="190" height="22" rx="4" fill="#9FE1CB" stroke="none"/>
<text x="125" y="394" text-anchor="middle" font-size="11" fill="#04342C">2. Sauvetage nuit via Ba</text>
<rect x="30" y="406" width="190" height="22" rx="4" fill="#9FE1CB" stroke="none"/>
<text x="125" y="422" text-anchor="middle" font-size="11" fill="#04342C">3. Inframonde (Antichambre)</text>
<text x="125" y="450" text-anchor="middle" font-size="11" fill="#0F6E56" font-weight="500">Plus on attend → plus dur</text>
<text x="125" y="466" text-anchor="middle" font-size="10" fill="#0F6E56" font-style="italic">Âmes deviennent sauvages</text>

<!-- Résolution catatonie -->
<line x1="340" y1="280" x2="340" y2="315" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<rect x="245" y="315" width="190" height="140" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="340" y="338" text-anchor="middle" font-size="13" fill="#042C53" font-weight="500">Résolution folie</text>
<rect x="260" y="350" width="160" height="22" rx="4" fill="#B5D4F4" stroke="none"/>
<text x="340" y="366" text-anchor="middle" font-size="11" fill="#042C53">1. Aide compagnons</text>
<rect x="260" y="378" width="160" height="22" rx="4" fill="#B5D4F4" stroke="none"/>
<text x="340" y="394" text-anchor="middle" font-size="11" fill="#042C53">2. Troc fin de combat</text>
<rect x="260" y="406" width="160" height="22" rx="4" fill="#B5D4F4" stroke="none"/>
<text x="340" y="422" text-anchor="middle" font-size="11" fill="#042C53">3. Attendre (indispo)</text>
<text x="340" y="445" text-anchor="middle" font-size="12" fill="#0C447C" font-weight="600">Seul regen : DORMIR</text>

<!-- Régénération -->
<rect x="460" y="315" width="190" height="100" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
<text x="555" y="338" text-anchor="middle" font-size="13" fill="#173404" font-weight="500">Régénération</text>
<text x="555" y="362" text-anchor="middle" font-size="11" fill="#3B6D11">HP : repos, items, soins</text>
<text x="555" y="382" text-anchor="middle" font-size="11" fill="#3B6D11">(Hetep = seul soigneur)</text>
<text x="555" y="402" text-anchor="middle" font-size="12" fill="#27500A" font-weight="600">SP : DORMIR uniquement</text>

<!-- Principe -->
<rect x="30" y="500" width="620" height="45" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="520" text-anchor="middle" font-size="13" fill="#2C2C2A" font-weight="500">Principe cardinal : rien n'est jamais gratuit.</text>
<text x="340" y="538" text-anchor="middle" font-size="11" fill="#5F5E5A">Utiliser [SHIFT+] = perdre SP. Se battre = risquer HP. Jouer la nuit = pas de regen SP. Chaque choix a un coût.</text>
</svg>