<svg width="1400" height="600" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">

<text x="350" y="22" text-anchor="middle" font-size="15" fill="#2C2C2A" font-weight="700">[SHIFT+] — Ce que tu crois voir vs ce qui se passe VRAIMENT</text>

<!-- ===== PANNEAU GAUCHE : CE QUE TU VOIS ===== -->
<rect x="10" y="38" width="330" height="250" rx="10" fill="#FFF0F5" stroke="#D4537E" stroke-width="2"/>
<text x="175" y="62" text-anchor="middle" font-size="14" fill="#4B1528" font-weight="700">😎 Ce que le joueur croit</text>

<!-- Ville stylisée -->
<rect x="30" y="120" width="45" height="80" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<rect x="90" y="100" width="40" height="100" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<rect x="250" y="110" width="50" height="90" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<line x1="30" y1="200" x2="320" y2="200" stroke="#B4B2A9" stroke-width="1"/>

<!-- Pubs colorées et fun -->
<rect x="35" y="128" width="35" height="18" rx="3" fill="#D4537E" opacity="0.4"/>
<text x="52" y="141" text-anchor="middle" font-size="7" fill="#fff">PUB</text>
<rect x="255" y="118" width="40" height="14" rx="3" fill="#378ADD" opacity="0.4"/>
<text x="275" y="129" text-anchor="middle" font-size="7" fill="#fff">NAV →</text>
<rect x="145" y="90" width="60" height="18" rx="3" fill="#97C459" opacity="0.4"/>
<text x="175" y="103" text-anchor="middle" font-size="7" fill="#fff">PROMO -50%</text>

<!-- Personnage content avec avatar Ba -->
<circle cx="175" cy="168" r="24" fill="#FBEAF0" stroke="#D4537E" stroke-width="2.5"/>
<text x="175" y="176" text-anchor="middle" font-size="16" fill="#993556" font-weight="700">K</text>
<!-- Sourire -->
<text x="175" y="153" text-anchor="middle" font-size="14">😊</text>

<!-- Avatar Ba au dessus -->
<circle cx="175" cy="130" r="12" fill="#D4537E" opacity="0.3" stroke="#D4537E" stroke-width="1"/>
<text x="175" y="135" text-anchor="middle" font-size="10" fill="#993556">Ba</text>

<text x="175" y="228" text-anchor="middle" font-size="13" fill="#993556" font-weight="600">« Un metavers sympa ! »</text>
<text x="175" y="248" text-anchor="middle" font-size="11" fill="#993556">Pubs, apps, navigation</text>
<text x="175" y="265" text-anchor="middle" font-size="11" fill="#993556">Tout est fun et coloré ✨</text>

<!-- ===== FLECHE CENTRALE ===== -->
<text x="350" y="170" text-anchor="middle" font-size="11" fill="#E24B4A" font-weight="700">EN</text>
<text x="350" y="185" text-anchor="middle" font-size="11" fill="#E24B4A" font-weight="700">VRAI</text>
<text x="350" y="200" text-anchor="middle" font-size="18" fill="#E24B4A">→</text>

<!-- ===== PANNEAU DROIT : CE QUI SE PASSE ===== -->
<rect x="370" y="38" width="320" height="250" rx="10" fill="#1a1a2e" stroke="#E24B4A" stroke-width="2.5"/>
<text x="530" y="62" text-anchor="middle" font-size="14" fill="#E24B4A" font-weight="700">😱 Ce qui se passe VRAIMENT</text>

<!-- Ka (double éthéré) seul dans le noir -->
<circle cx="530" cy="150" r="24" fill="none" stroke="#378ADD" stroke-width="2.5" stroke-dasharray="5 3"/>
<text x="530" y="158" text-anchor="middle" font-size="14" fill="#85B7EB" font-weight="600">Ka</text>
<text x="530" y="138" text-anchor="middle" font-size="12" fill="#85B7EB">double éthéré</text>

<!-- Morts tout autour (gros, menaçants) -->
<circle cx="430" cy="120" r="18" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="3 2"/>
<text x="430" y="127" text-anchor="middle" font-size="18">💀</text>
<circle cx="620" cy="130" r="18" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="3 2"/>
<text x="620" y="137" text-anchor="middle" font-size="18">👻</text>
<circle cx="460" cy="190" r="16" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="3 2"/>
<text x="460" y="197" text-anchor="middle" font-size="16">💀</text>
<circle cx="600" cy="185" r="16" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="3 2"/>
<text x="600" y="192" text-anchor="middle" font-size="16">👹</text>
<circle cx="530" cy="210" r="14" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="3 2"/>
<text x="530" y="217" text-anchor="middle" font-size="14">☠️</text>

<text x="530" y="248" text-anchor="middle" font-size="13" fill="#E24B4A" font-weight="700">Entouré de morts.</text>
<text x="530" y="268" text-anchor="middle" font-size="12" fill="#E24B4A">On ressent, on ne voit pas.</text>
<text x="530" y="282" text-anchor="middle" font-size="11" fill="#85B7EB">→ SP baissent en continu</text>
</svg>