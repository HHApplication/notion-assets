<svg width="1360" height="1100" viewBox="0 0 680 550" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">

<text x="340" y="22" text-anchor="middle" font-size="16" fill="#2C2C2A" font-weight="600">Les cinq plans d'existence — et le secret ontologique</text>

<!-- Plan 1 : Monde sensible -->
<rect x="30" y="50" width="390" height="68" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
<text x="225" y="72" text-anchor="middle" font-size="14" fill="#412402" font-weight="600">1. Monde sensible</text>
<text x="225" y="92" text-anchor="middle" font-size="11" fill="#854F0B">Le réel — Égypte antique SF/cyberpunk</text>
<text x="225" y="108" text-anchor="middle" font-size="11" fill="#854F0B">On dirige Khat (corps physique)</text>

<!-- Plan 2 : Monde du Ba -->
<rect x="30" y="128" width="390" height="68" rx="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="1"/>
<text x="225" y="150" text-anchor="middle" font-size="14" fill="#4B1528" font-weight="600">2. Monde du Ba (« virtuel »)</text>
<text x="225" y="170" text-anchor="middle" font-size="11" fill="#993556">Layer RA/RV superposé via [SHIFT+]</text>
<text x="225" y="186" text-anchor="middle" font-size="11" fill="#993556">On dirige le Ba (avatar numérique)</text>

<!-- Plan 3 : Monde invisible -->
<rect x="30" y="206" width="390" height="68" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text x="225" y="228" text-anchor="middle" font-size="14" fill="#042C53" font-weight="600">3. Monde invisible</text>
<text x="225" y="248" text-anchor="middle" font-size="11" fill="#185FA5">Plan spirituel — Ba, Ka des vivants</text>
<text x="225" y="264" text-anchor="middle" font-size="11" fill="#185FA5">On dirige Ka (double éthéré)</text>

<!-- Plan 4 : Inframonde -->
<rect x="30" y="284" width="390" height="68" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<text x="225" y="306" text-anchor="middle" font-size="14" fill="#2C2C2A" font-weight="600">4. Inframonde</text>
<text x="225" y="326" text-anchor="middle" font-size="11" fill="#5F5E5A">Entre-deux — pesée de Ab (âme)</text>
<text x="225" y="342" text-anchor="middle" font-size="11" fill="#5F5E5A">Antichambre du Grand Tribunal (fermé)</text>

<!-- Plan 5 : Monde mythique -->
<rect x="30" y="362" width="390" height="68" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="225" y="384" text-anchor="middle" font-size="14" fill="#26215C" font-weight="600">5. Monde mythique</text>
<text x="225" y="404" text-anchor="middle" font-size="11" fill="#534AB7">Au-delà — dieux et transfigurés</text>
<text x="225" y="420" text-anchor="middle" font-size="11" fill="#534AB7">Rôle majeur seconde moitié du jeu</text>

<!-- SECRET ONTOLOGIQUE -->
<rect x="445" y="100" width="210" height="280" rx="14" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="550" y="130" text-anchor="middle" font-size="15" fill="#501313" font-weight="600">LE SECRET</text>

<line x1="460" y1="148" x2="640" y2="148" stroke="#F09595" stroke-width="0.5"/>

<text x="550" y="170" text-anchor="middle" font-size="12" fill="#A32D2D" font-weight="500">Monde du Ba</text>
<text x="550" y="188" text-anchor="middle" font-size="12" fill="#A32D2D" font-weight="600">= Monde invisible</text>

<text x="550" y="215" text-anchor="middle" font-size="11" fill="#791F1F">L'utilisateur pense jouer</text>
<text x="550" y="232" text-anchor="middle" font-size="11" fill="#791F1F">à la réalité mixte.</text>

<text x="550" y="258" text-anchor="middle" font-size="11" fill="#791F1F">En réalité il confronte</text>
<text x="550" y="275" text-anchor="middle" font-size="11" fill="#791F1F" font-weight="500">son propre esprit.</text>

<line x1="460" y1="290" x2="640" y2="290" stroke="#F09595" stroke-width="0.5"/>

<text x="550" y="310" text-anchor="middle" font-size="11" fill="#A32D2D" font-weight="500">Brèche ouverte :</text>
<text x="550" y="328" text-anchor="middle" font-size="11" fill="#791F1F">invisible ↔ inframonde</text>
<text x="550" y="348" text-anchor="middle" font-size="11" fill="#791F1F">Morts circulent parmi</text>
<text x="550" y="365" text-anchor="middle" font-size="11" fill="#791F1F">les vivants.</text>

<!-- Flèches vers le secret -->
<path d="M420 162 L443 162" fill="none" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#redarr)"/>
<path d="M420 240 L443 240" fill="none" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#redarr)"/>
<path d="M420 318 L443 318" fill="none" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#redarr)"/>
<defs><marker id="redarr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round"/></marker></defs>

<!-- Conséquence gameplay -->
<rect x="30" y="455" width="625" height="68" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
<text x="342" y="478" text-anchor="middle" font-size="13" fill="#173404" font-weight="600">Traduction gameplay</text>
<text x="342" y="498" text-anchor="middle" font-size="12" fill="#3B6D11">Activer [SHIFT+] = entrer dans le monde invisible sans le savoir</text>
<text x="342" y="515" text-anchor="middle" font-size="12" fill="#3B6D11">= s'exposer aux morts = SP qui baissent = On ressent, on ne voit pas</text>
</svg>