<svg width="1360" height="700" viewBox="0 0 680 350" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">
<text x="340" y="20" text-anchor="middle" font-size="14" fill="#2C2C2A" font-weight="600">Storyboard — Structure d'un chapitre : équipes et embranchements</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/></marker></defs>

<!-- Début chapitre -->
<rect x="200" y="38" width="280" height="45" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
<text x="340" y="56" text-anchor="middle" font-size="12" fill="#412402" font-weight="600">Début du chapitre — Constitution d'équipe</text>
<text x="340" y="72" text-anchor="middle" font-size="10" fill="#854F0B">Le joueur choisit ses titulaires. Choix verrouillé jusqu'à la fin.</text>

<!-- Équipe A -->
<line x1="280" y1="83" x2="180" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<rect x="60" y="108" width="240" height="50" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<text x="180" y="128" text-anchor="middle" font-size="11" fill="#04342C" font-weight="600">Équipe A — Titulaires (joueur)</text>
<circle cx="100" cy="145" r="10" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
<text x="100" y="149" text-anchor="middle" font-size="9" fill="#4A1B0C">A</text>
<circle cx="135" cy="145" r="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="1"/>
<text x="135" y="149" text-anchor="middle" font-size="9" fill="#993556">K</text>
<circle cx="170" cy="145" r="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
<text x="170" y="149" text-anchor="middle" font-size="9" fill="#854F0B">H</text>
<circle cx="205" cy="145" r="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<text x="205" y="149" text-anchor="middle" font-size="9" fill="#04342C">M</text>

<!-- Équipe B -->
<line x1="400" y1="83" x2="500" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<rect x="380" y="108" width="240" height="50" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="500" y="128" text-anchor="middle" font-size="11" fill="#26215C" font-weight="600">Équipe B — Non-titulaires (autonomes)</text>
<circle cx="440" cy="145" r="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1" stroke-dasharray="2 2"/>
<text x="440" y="149" text-anchor="middle" font-size="9" fill="#534AB7">He</text>
<circle cx="475" cy="145" r="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1" stroke-dasharray="2 2"/>
<text x="475" y="149" text-anchor="middle" font-size="9" fill="#534AB7">O</text>
<text x="520" y="149" font-size="9" fill="#534AB7" font-style="italic">vivent leur aventure</text>

<!-- Milieu de chapitre -->
<line x1="180" y1="158" x2="180" y2="185" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<rect x="80" y="185" width="200" height="30" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="180" y="204" text-anchor="middle" font-size="10" fill="#5F5E5A">Chapitre en cours — quêtes, combats, dialogues</text>

<!-- Fin de chapitre -->
<line x1="180" y1="215" x2="180" y2="240" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<rect x="80" y="240" width="200" height="30" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text x="180" y="260" text-anchor="middle" font-size="10" fill="#501313" font-weight="500">Fin du chapitre → séparation possible</text>

<!-- Options chapitre suivant -->
<line x1="180" y1="270" x2="180" y2="295" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- 4 options en bas -->
<rect x="20" y="295" width="145" height="40" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="92" y="312" text-anchor="middle" font-size="10" fill="#04342C" font-weight="500">Continuer A</text>
<text x="92" y="327" text-anchor="middle" font-size="9" fill="#0F6E56">mêmes titulaires</text>

<rect x="175" y="295" width="145" height="40" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="247" y="312" text-anchor="middle" font-size="10" fill="#412402" font-weight="500">Réintégrer B→A</text>
<text x="247" y="327" text-anchor="middle" font-size="9" fill="#854F0B">s'ils acceptent</text>

<rect x="330" y="295" width="145" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="402" y="312" text-anchor="middle" font-size="10" fill="#26215C" font-weight="500">Basculer sur B</text>
<text x="402" y="327" text-anchor="middle" font-size="9" fill="#534AB7">B devient A</text>

<rect x="485" y="295" width="175" height="40" rx="6" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
<text x="572" y="312" text-anchor="middle" font-size="10" fill="#4B1528" font-weight="500">⏪ Revenir au précédent</text>
<text x="572" y="327" text-anchor="middle" font-size="9" fill="#993556">RÉCOMPENSÉ, pas sanctionné</text>

<text x="340" y="348" text-anchor="middle" font-size="11" fill="#2C2C2A" font-style="italic">Le joueur choisit ce qu'il veut voir de l'histoire. Ses parties se cumulent.</text>
</svg>