<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Arial, sans-serif" style="background: #fff;">
  <defs>
    <style>
      .panel { fill: #FFF8E7; stroke: #2C1810; stroke-width: 3; rx: 12; }
      .num { font-size: 28px; font-weight: bold; fill: #C62828; }
      .label { font-size: 16px; font-weight: bold; fill: #2C1810; text-anchor: middle; }
      .arrow { fill: none; stroke: #D4A843; stroke-width: 4; marker-end: url(#arrowhead); }
      .body { stroke: #2C1810; stroke-width: 3; stroke-linecap: round; fill: none; }
      .head { fill: #FFD54F; stroke: #2C1810; stroke-width: 2; }
      .ground { fill: #E8D5B7; }
      .sky { fill: #E3F2FD; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4A843"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="40" font-size="24" font-weight="bold" fill="#1A237E" text-anchor="middle">BOUCLE DE JEU</text>
  
  <!-- Panel 1: EXPLORE - character walks in Egyptian street -->
  <rect class="panel" x="20" y="60" width="370" height="320"/>
  <text class="num" x="40" y="95">1</text>
  <!-- Sky + ground -->
  <rect class="sky" x="23" y="63" width="364" height="200" rx="10"/>
  <rect class="ground" x="23" y="250" width="364" height="127" rx="0"/>
  <!-- Pyramid background -->
  <polygon points="300,120 350,250 250,250" fill="#D4A843" opacity="0.4"/>
  <!-- Stick figure walking happily -->
  <circle class="head" cx="150" cy="190" r="22"/>
  <text x="142" y="198" font-size="20">😊</text>
  <line class="body" x1="150" y1="212" x2="150" y2="260"/>
  <line class="body" x1="150" y1="230" x2="130" y2="250"/>
  <line class="body" x1="150" y1="230" x2="170" y2="250"/>
  <line class="body" x1="150" y1="260" x2="130" y2="290"/>
  <line class="body" x1="150" y1="260" x2="170" y2="290"/>
  <!-- Walking motion lines -->
  <line x1="110" y1="240" x2="95" y2="240" stroke="#888" stroke-width="2" opacity="0.5"/>
  <line x1="110" y1="250" x2="90" y2="250" stroke="#888" stroke-width="2" opacity="0.5"/>
  <text class="label" x="205" y="360">EXPLORER</text>

  <!-- Arrow 1→2 -->
  <path class="arrow" d="M 395,220 L 420,220"/>

  <!-- Panel 2: ENCOUNTER - character sees enemy -->
  <rect class="panel" x="420" y="60" width="370" height="320"/>
  <text class="num" x="440" y="95">2</text>
  <rect class="sky" x="423" y="63" width="364" height="200" rx="10"/>
  <rect class="ground" x="423" y="250" width="364" height="127"/>
  <!-- Hero surprised -->
  <circle class="head" cx="500" cy="190" r="22"/>
  <text x="492" y="198" font-size="20">😨</text>
  <line class="body" x1="500" y1="212" x2="500" y2="260"/>
  <line class="body" x1="500" y1="230" x2="480" y2="250"/>
  <line class="body" x1="500" y1="230" x2="520" y2="245"/>
  <line class="body" x1="500" y1="260" x2="485" y2="290"/>
  <line class="body" x1="500" y1="260" x2="515" y2="290"/>
  <!-- "!" bubble -->
  <text x="510" y="170" font-size="30" font-weight="bold" fill="#C62828">!</text>
  <!-- Monster/enemy (red, angry) -->
  <circle cx="700" cy="190" r="25" fill="#EF5350" stroke="#2C1810" stroke-width="2"/>
  <text x="690" y="198" font-size="22">😡</text>
  <line x1="700" y1="215" x2="700" y2="265" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
  <line x1="700" y1="235" x2="675" y2="250" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
  <line x1="700" y1="235" x2="725" y2="250" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
  <line x1="700" y1="265" x2="680" y2="295" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
  <line x1="700" y1="265" x2="720" y2="295" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
  <text class="label" x="605" y="360">RENCONTRE</text>

  <!-- Arrow 2→3 -->
  <path class="arrow" d="M 795,220 L 820,220"/>

  <!-- Panel 3: COMBAT - action! -->
  <rect class="panel" x="815" y="60" width="370" height="320"/>
  <text class="num" x="835" y="95">3</text>
  <rect x="818" y="63" width="364" height="200" rx="10" fill="#FFF3E0"/>
  <rect class="ground" x="818" y="250" width="364" height="127"/>
  <!-- Hero attacking -->
  <circle class="head" cx="920" cy="185" r="22"/>
  <text x="912" y="193" font-size="20">😤</text>
  <line class="body" x1="920" y1="207" x2="920" y2="255"/>
  <line class="body" x1="920" y1="225" x2="955" y2="210"/>
  <line class="body" x1="920" y1="255" x2="905" y2="285"/>
  <line class="body" x1="920" y1="255" x2="935" y2="285"/>
  <!-- Sword -->
  <line x1="955" y1="210" x2="985" y2="185" stroke="#795548" stroke-width="4"/>
  <line x1="985" y1="185" x2="990" y2="180" stroke="#FFD54F" stroke-width="3"/>
  <!-- Impact stars -->
  <text x="1000" y="210" font-size="24">💥</text>
  <!-- Enemy hit -->
  <circle cx="1070" cy="200" r="22" fill="#EF5350" stroke="#2C1810" stroke-width="2"/>
  <text x="1062" y="208" font-size="20">😵</text>
  <line x1="1070" y1="222" x2="1080" y2="270" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
  <text class="label" x="1000" y="360">COMBAT</text>

  <!-- Arrow 3→4 (going down) -->
  <path class="arrow" d="M 1000,385 L 1000,430"/>

  <!-- Panel 4: LOOT - treasure! -->
  <rect class="panel" x="815" y="430" width="370" height="320"/>
  <text class="num" x="835" y="465">4</text>
  <!-- Hero happy with loot -->
  <circle class="head" cx="950" cy="540" r="22"/>
  <text x="942" y="548" font-size="20">🤩</text>
  <line class="body" x1="950" y1="562" x2="950" y2="610"/>
  <line class="body" x1="950" y1="580" x2="925" y2="570"/>
  <line class="body" x1="950" y1="580" x2="975" y2="570"/>
  <line class="body" x1="950" y1="610" x2="935" y2="640"/>
  <line class="body" x1="950" y1="610" x2="965" y2="640"/>
  <!-- Treasure chest -->
  <rect x="1040" y="580" width="50" height="35" rx="5" fill="#8D6E63" stroke="#2C1810" stroke-width="2"/>
  <rect x="1040" y="575" width="50" height="12" rx="3" fill="#A1887F" stroke="#2C1810" stroke-width="2"/>
  <!-- Coins/sparkles -->
  <text x="1050" y="570" font-size="18">✨</text>
  <circle cx="1075" cy="560" r="6" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
  <circle cx="1090" cy="565" r="5" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
  <!-- XP bar -->
  <rect x="910" y="660" width="100" height="14" rx="7" fill="#E0E0E0" stroke="#2C1810" stroke-width="1"/>
  <rect x="910" y="660" width="70" height="14" rx="7" fill="#66BB6A"/>
  <text x="940" y="671" font-size="9" fill="white" font-weight="bold">XP +</text>
  <text class="label" x="1000" y="730">RÉCOMPENSES</text>

  <!-- Arrow 4→5 -->
  <path class="arrow" d="M 810,590 L 795,590"/>

  <!-- Panel 5: REST/NIGHT - sleeping -->
  <rect class="panel" x="420" y="430" width="370" height="320"/>
  <text class="num" x="440" y="465">5</text>
  <rect x="423" y="433" width="364" height="220" rx="10" fill="#1A237E" opacity="0.15"/>
  <!-- Moon -->
  <circle cx="720" cy="480" r="20" fill="#FFF9C4"/>
  <circle cx="728" cy="475" r="17" fill="#1A237E" opacity="0.15"/>
  <!-- Stars -->
  <text x="640" y="480" font-size="12" fill="#FFD54F">★</text>
  <text x="680" y="495" font-size="10" fill="#FFD54F">★</text>
  <text x="660" y="470" font-size="8" fill="#FFD54F">★</text>
  <!-- Character sleeping -->
  <circle class="head" cx="560" cy="590" r="22"/>
  <text x="552" y="598" font-size="20">😴</text>
  <!-- Bed (horizontal body) -->
  <line x1="560" y1="612" x2="560" y2="630" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
  <line x1="540" y1="635" x2="620" y2="635" stroke="#8D6E63" stroke-width="4"/>
  <!-- Zzz -->
  <text x="585" y="575" font-size="14" fill="#5C6BC0" font-weight="bold">Z</text>
  <text x="598" y="562" font-size="18" fill="#5C6BC0" font-weight="bold">Z</text>
  <text x="615" y="545" font-size="22" fill="#5C6BC0" font-weight="bold">Z</text>
  <!-- HP/SP regenerating -->
  <text x="500" y="680" font-size="14" fill="#4CAF50" font-weight="bold">HP ▲</text>
  <text x="580" y="680" font-size="14" fill="#7E57C2" font-weight="bold">SP ▲</text>
  <text class="label" x="605" y="730">REPOS / NUIT</text>

  <!-- Arrow 5→1 (going left and up, curved) -->
  <path class="arrow" d="M 420,590 C 300,590 250,430 205,385"/>

  <!-- Central cycle icon -->
  <circle cx="420" cy="430" r="25" fill="#D4A843" opacity="0.2"/>
  <text x="407" y="438" font-size="20">🔄</text>
</svg>