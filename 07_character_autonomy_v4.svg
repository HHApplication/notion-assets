<svg width="1200" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="Arial, sans-serif" style="background: #fff;">
  <defs>
    <style>
      .panel { fill: #FFF8E7; stroke: #2C1810; stroke-width: 3; rx: 12; }
      .num { font-size: 26px; font-weight: bold; fill: #C62828; }
      .label { font-size: 13px; font-weight: bold; fill: #2C1810; text-anchor: middle; }
      .body { stroke: #2C1810; stroke-width: 2.5; stroke-linecap: round; fill: none; }
    </style>
  </defs>
  
  <text x="600" y="35" font-size="22" font-weight="bold" fill="#1A237E" text-anchor="middle">AUTONOMIE DES PERSONNAGES — ILS NE SONT PAS DES PANTINS</text>

  <!-- Panel 1: Leader gives order, one refuses -->
  <rect class="panel" x="15" y="50" width="285" height="420"/>
  <text class="num" x="30" y="80">1</text>
  <text x="157" y="78" font-size="13" font-weight="bold" fill="#1A237E">ORDRE DU JOUEUR</text>
  <!-- Player character (leader) pointing right -->
  <circle cx="80" cy="180" r="20" fill="#FFD54F" stroke="#2C1810" stroke-width="2"/>
  <text x="72" y="187" font-size="18">😤</text>
  <line class="body" x1="80" y1="200" x2="80" y2="250"/>
  <line class="body" x1="80" y1="220" x2="110" y2="205"/>
  <line class="body" x1="80" y1="250" x2="65" y2="280"/>
  <line class="body" x1="80" y1="250" x2="95" y2="280"/>
  <!-- Speech: "Par ici !" -->
  <rect x="95" y="145" width="75" height="25" rx="6" fill="white" stroke="#2C1810" stroke-width="1.5"/>
  <text x="110" y="163" font-size="10" fill="#2C1810">Par ici ! →</text>
  <!-- Following teammate -->
  <circle cx="180" cy="200" r="16" fill="#C8E6C9" stroke="#2C1810" stroke-width="2"/>
  <text x="173" y="207" font-size="14">😊</text>
  <text x="170" y="230" font-size="9" fill="#4CAF50">OK 👍</text>
  <!-- Refusing teammate -->
  <circle cx="230" cy="200" r="16" fill="#FFCDD2" stroke="#2C1810" stroke-width="2"/>
  <text x="223" y="207" font-size="14">😒</text>
  <text x="213" y="230" font-size="9" fill="#C62828">Non. 🚫</text>
  <!-- Teammate going other way -->
  <path d="M230,220 L230,260 L200,290" stroke="#C62828" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <text x="185" y="305" font-size="9" fill="#C62828">← part seul</text>
  <text class="label" x="157" y="400">Ils peuvent REFUSER</text>
  <text x="157" y="420" font-size="10" fill="#666" text-anchor="middle">et partir de leur côté</text>

  <!-- Panel 2: Character expresses needs -->
  <rect class="panel" x="310" y="50" width="285" height="420"/>
  <text class="num" x="325" y="80">2</text>
  <text x="452" y="78" font-size="13" font-weight="bold" fill="#1A237E">BESOINS PROPRES</text>
  <!-- Character with need bubbles -->
  <circle cx="400" cy="200" r="22" fill="#FFB6C1" stroke="#2C1810" stroke-width="2"/>
  <text x="392" y="208" font-size="20">😩</text>
  <line class="body" x1="400" y1="222" x2="400" y2="270"/>
  <!-- Need icons popping up -->
  <rect x="430" y="150" width="120" height="95" rx="8" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="445" y="170" font-size="12">😴 Fatiguée</text>
  <text x="445" y="190" font-size="12">🍽️ Faim</text>
  <text x="445" y="210" font-size="12">😤 Énervée</text>
  <text x="445" y="230" font-size="12">🛡️ Refuse arme</text>
  <!-- Player response options -->
  <text x="400" y="310" font-size="11" fill="#2C1810" text-anchor="middle" font-weight="bold">Le joueur peut :</text>
  <text x="400" y="335" font-size="10" fill="#4CAF50" text-anchor="middle">✅ Écouter ses besoins</text>
  <text x="400" y="355" font-size="10" fill="#FF8F00" text-anchor="middle">🤝 Négocier / troquer</text>
  <text x="400" y="375" font-size="10" fill="#C62828" text-anchor="middle">❌ Ignorer (risque !)</text>
  <text class="label" x="452" y="440">Ils ont des ENVIES</text>

  <!-- Panel 3: Mediator needed -->
  <rect class="panel" x="605" y="50" width="285" height="420"/>
  <text class="num" x="620" y="80">3</text>
  <text x="747" y="78" font-size="13" font-weight="bold" fill="#1A237E">MÉDIATEUR</text>
  <!-- Two characters in conflict -->
  <circle cx="660" cy="200" r="18" fill="#FFD54F" stroke="#2C1810" stroke-width="2"/>
  <text x="653" y="207" font-size="16">😠</text>
  <circle cx="780" cy="200" r="18" fill="#FFCDD2" stroke="#2C1810" stroke-width="2"/>
  <text x="773" y="207" font-size="16">😠</text>
  <!-- Lightning between them -->
  <text x="710" y="205" font-size="20">⚡</text>
  <!-- Mediator arrives (third character) -->
  <circle cx="720" cy="300" r="20" fill="#C8E6C9" stroke="#2C1810" stroke-width="2"/>
  <text x="712" y="308" font-size="18">😌</text>
  <line x1="720" y1="320" x2="720" y2="360" stroke="#2C1810" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Connection lines -->
  <line x1="700" y1="290" x2="670" y2="218" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="740" y1="290" x2="770" y2="218" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Hearts appearing -->
  <text x="665" y="250" font-size="12">💚</text>
  <text x="775" y="250" font-size="12">💚</text>
  <text x="720" y="390" font-size="10" fill="#4CAF50" text-anchor="middle" font-weight="bold">Affinité rétablie</text>
  <text class="label" x="747" y="440">Jouer UN MÉDIATEUR</text>

  <!-- Panel 4: Benefits of good relations -->
  <rect class="panel" x="900" y="50" width="285" height="420"/>
  <text class="num" x="915" y="80">4</text>
  <text x="1042" y="78" font-size="13" font-weight="bold" fill="#1A237E">BONS LIENS = AVANTAGES</text>
  <!-- Happy team together -->
  <circle cx="990" cy="190" r="18" fill="#FFD54F" stroke="#2C1810" stroke-width="2"/>
  <text x="983" y="197" font-size="16">😊</text>
  <circle cx="1040" cy="200" r="16" fill="#FFB6C1" stroke="#2C1810" stroke-width="2"/>
  <text x="1033" y="207" font-size="14">😊</text>
  <circle cx="1090" cy="195" r="16" fill="#C8E6C9" stroke="#2C1810" stroke-width="2"/>
  <text x="1083" y="202" font-size="14">😊</text>
  <!-- Hearts between them -->
  <text x="1010" y="180" font-size="10">❤️</text>
  <text x="1060" y="185" font-size="10">❤️</text>
  <!-- Benefits list -->
  <rect x="950" y="240" width="190" height="140" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="965" y="265" font-size="11" fill="#2E7D32">🛡️ Protègent le leader</text>
  <text x="965" y="285" font-size="11" fill="#2E7D32">⚔️ Combattent mieux</text>
  <text x="965" y="305" font-size="11" fill="#2E7D32">💬 Plus coopératifs</text>
  <text x="965" y="325" font-size="11" fill="#2E7D32">🎯 Suivent les ordres</text>
  <text x="965" y="345" font-size="11" fill="#2E7D32">❤️ Risquent leur vie</text>
  <!-- VS bad relations -->
  <rect x="950" y="395" width="190" height="40" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="965" y="415" font-size="10" fill="#C62828">❌ Sinon : caprices, désobéissance</text>
  <text x="965" y="428" font-size="10" fill="#C62828">💔 tensions, départ du groupe</text>
  <text class="label" x="1042" y="460">RELATIONS = GAMEPLAY</text>
</svg>