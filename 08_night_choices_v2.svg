<svg width="1400" height="520" viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">

<text x="350" y="22" text-anchor="middle" font-size="15" fill="#2C2C2A" font-weight="700">22h — Que fait chaque personnage cette nuit ?</text>

<!-- ===== CONTINUER ===== -->
<rect x="10" y="40" width="220" height="210" rx="8" fill="#1a1a2e" stroke="#378ADD" stroke-width="2"/>
<!-- Lune -->
<circle cx="190" cy="65" r="15" fill="#FAC775" stroke="none"/>

<!-- Anubis sur un toit (gros) -->
<rect x="30" y="155" width="180" height="10" fill="#333" stroke="none"/>
<rect x="60" y="120" width="40" height="45" fill="#333" stroke="none"/>
<rect x="140" y="130" width="50" height="35" fill="#333" stroke="none"/>

<circle cx="100" cy="110" r="22" fill="#1a1a2e" stroke="#378ADD" stroke-width="3"/>
<text x="100" y="118" text-anchor="middle" font-size="14" fill="#85B7EB" font-weight="700">An</text>
<!-- Corps accroupi -->
<line x1="100" y1="132" x2="100" y2="150" stroke="#378ADD" stroke-width="3"/>
<!-- Cape -->
<path d="M82 120 L75 150 L125 150 L118 120" fill="none" stroke="#378ADD" stroke-width="1.5" opacity="0.5"/>

<!-- Cible en bas -->
<circle cx="170" cy="175" r="10" fill="none" stroke="#E24B4A" stroke-width="1.5"/>
<text x="170" y="179" text-anchor="middle" font-size="10">🏃</text>

<text x="115" y="195" text-anchor="middle" font-size="14" fill="#85B7EB" font-weight="700">🌙 CHASSER</text>
<text x="115" y="212" text-anchor="middle" font-size="11" fill="#85B7EB">+XP, missions nocturnes</text>
<text x="115" y="228" text-anchor="middle" font-size="11" fill="#E24B4A">Pas de repos → SP ↓↓</text>

<!-- ===== DORMIR ===== -->
<rect x="240" y="40" width="220" height="210" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="2"/>

<!-- Hetep dort (gros) -->
<circle cx="350" cy="110" r="28" fill="#EAF3DE" stroke="#639922" stroke-width="3"/>
<!-- Yeux fermés -->
<line x1="337" y1="105" x2="347" y2="105" stroke="#27500A" stroke-width="2.5" stroke-linecap="round"/>
<line x1="353" y1="105" x2="363" y2="105" stroke="#27500A" stroke-width="2.5" stroke-linecap="round"/>
<!-- Bouche endormie -->
<path d="M343 118 Q350 122 357 118" fill="none" stroke="#27500A" stroke-width="2" stroke-linecap="round"/>
<!-- ZZZ -->
<text x="380" y="90" font-size="18" fill="#639922" font-weight="600">Z</text>
<text x="395" y="78" font-size="14" fill="#639922" font-weight="600">z</text>
<text x="405" y="70" font-size="10" fill="#639922" font-weight="600">z</text>

<!-- Lit -->
<rect x="280" y="140" width="140" height="30" rx="8" fill="#d4eabd" stroke="#639922" stroke-width="1"/>

<!-- Barres qui remontent -->
<text x="290" y="195" font-size="11" fill="#27500A">❤️ HP  █████████░ ↑</text>
<text x="290" y="212" font-size="11" fill="#185FA5">🔵 SP  ██████████ FULL</text>

<text x="350" y="235" text-anchor="middle" font-size="14" fill="#27500A" font-weight="700">💤 DORMIR</text>
<text x="350" y="248" text-anchor="middle" font-size="10" fill="#27500A">Seul moyen de récup SP</text>

<!-- ===== VOYAGE ASTRAL ===== -->
<rect x="470" y="40" width="220" height="210" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/>

<!-- Personnage endormi petit -->
<circle cx="520" cy="175" r="12" fill="#F1EFE8" stroke="#888780" stroke-width="1" opacity="0.5"/>
<line x1="520" y1="187" x2="520" y2="200" stroke="#888780" stroke-width="1" opacity="0.5"/>
<text x="540" y="195" font-size="9" fill="#888780">dort</text>

<!-- Ba oiseau GROS qui vole -->
<circle cx="580" cy="100" r="30" fill="#EEEDFE" stroke="#7F77DD" stroke-width="3" stroke-dasharray="5 3"/>
<text x="580" y="95" text-anchor="middle" font-size="28">🦅</text>
<!-- Ailes -->
<line x1="550" y1="90" x2="530" y2="75" stroke="#7F77DD" stroke-width="2"/>
<line x1="610" y1="90" x2="630" y2="75" stroke="#7F77DD" stroke-width="2"/>

<!-- Lien entre les deux -->
<line x1="530" y1="170" x2="565" y2="130" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

<!-- Options -->
<text x="580" y="155" text-anchor="middle" font-size="11" fill="#534AB7">🎮 Mini-jeux</text>
<text x="580" y="170" text-anchor="middle" font-size="11" fill="#534AB7">⏪ Retour passé</text>
<text x="580" y="185" text-anchor="middle" font-size="11" fill="#534AB7">💀 Sauver âme</text>

<text x="580" y="235" text-anchor="middle" font-size="14" fill="#534AB7" font-weight="700">🦅 VOYAGE ASTRAL</text>
<text x="580" y="248" text-anchor="middle" font-size="10" fill="#534AB7">L'esprit s'envole</text>
