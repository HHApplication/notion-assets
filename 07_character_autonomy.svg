<svg width="1360" height="800" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">
<text x="340" y="20" text-anchor="middle" font-size="14" fill="#2C2C2A" font-weight="600">Storyboard — Autonomie des personnages</text>

<!-- Case 1: Le joueur contrôle un perso, les autres vivent -->
<rect x="20" y="35" width="310" height="165" rx="6" fill="#FFF8F0" stroke="#B4B2A9" stroke-width="1.5"/>
<text x="30" y="52" font-size="11" fill="#5F5E5A" font-weight="500">Case 1 — Le joueur incarne Antef</text>

<!-- Antef (contrôlé) -->
<circle cx="80" cy="110" r="16" fill="#FAECE7" stroke="#D85A30" stroke-width="2"/>
<text x="80" y="114" text-anchor="middle" font-size="12" fill="#4A1B0C" font-weight="600">A</text>
<line x1="80" y1="126" x2="80" y2="158" stroke="#D85A30" stroke-width="2"/>
<line x1="65" y1="140" x2="95" y2="140" stroke="#D85A30" stroke-width="2"/>
<rect x="67" y="82" width="26" height="12" rx="3" fill="#97C459" stroke="none"/>
<text x="80" y="91" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">P1</text>

<!-- Flèche direction -->
<line x1="100" y1="130" x2="130" y2="130" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/></marker></defs>

<!-- Hetep (a faim, bulle) -->
<circle cx="180" cy="110" r="14" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.2"/>
<text x="180" y="114" text-anchor="middle" font-size="11" fill="#854F0B" font-weight="500">H</text>
<line x1="180" y1="124" x2="180" y2="150" stroke="#EF9F27" stroke-width="1.2"/>
<rect x="200" y="88" width="110" height="28" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="255" y="106" text-anchor="middle" font-size="10" fill="#633806">💬 « J'ai faim, on</text>
<text x="255" y="113" text-anchor="middle" font-size="10" fill="#633806">s'arrête manger ? »</text>

<!-- Kahay (part de son côté) -->
<circle cx="280" cy="135" r="14" fill="#FBEAF0" stroke="#D4537E" stroke-width="1.2" stroke-dasharray="3 2"/>
<text x="280" y="139" text-anchor="middle" font-size="11" fill="#993556" font-weight="500">K</text>
<line x1="290" y1="145" x2="310" y2="160" stroke="#D4537E" stroke-width="1" stroke-dasharray="3 2"/>
<text x="290" y="185" font-size="9" fill="#993556" font-style="italic">part en quête perso</text>

<!-- Case 2: Refus d'équiper -->
<rect x="350" y="35" width="310" height="165" rx="6" fill="#FFF8F0" stroke="#B4B2A9" stroke-width="1.5"/>
<text x="360" y="52" font-size="11" fill="#5F5E5A" font-weight="500">Case 2 — Le joueur veut équiper Hetep</text>

<!-- Menu équipement -->
<rect x="370" y="65" width="120" height="70" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="430" y="80" text-anchor="middle" font-size="10" fill="#5F5E5A" font-weight="500">INVENTAIRE</text>
<text x="430" y="96" text-anchor="middle" font-size="10" fill="#2C2C2A">🗡️ Épée sacrée</text>
<text x="430" y="110" text-anchor="middle" font-size="10" fill="#2C2C2A">→ Hetep</text>
<text x="430" y="124" text-anchor="middle" font-size="10" fill="#E24B4A" font-weight="500">❌ REFUSÉ</text>

<!-- Hetep qui refuse -->
<circle cx="540" cy="100" r="16" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
<text x="540" y="104" text-anchor="middle" font-size="12" fill="#854F0B" font-weight="500">H</text>
<rect x="565" y="78" width="85" height="35" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text x="607" y="93" text-anchor="middle" font-size="10" fill="#A32D2D">« Pas question.</text>
<text x="607" y="106" text-anchor="middle" font-size="10" fill="#A32D2D">C'est pas mon truc. »</text>

<text x="510" y="160" text-anchor="middle" font-size="10" fill="#5F5E5A" font-style="italic">Les personnages peuvent refuser</text>
<text x="510" y="175" text-anchor="middle" font-size="10" fill="#5F5E5A" font-style="italic">d'équiper certains objets</text>

<!-- Case 3: Interventions spontanées -->
<rect x="20" y="215" width="640" height="165" rx="6" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="1.5"/>
<text x="30" y="232" font-size="11" fill="#5F5E5A" font-weight="500">Case 3 — Interventions spontanées pendant l'exploration</text>

<!-- Scène: le groupe marche, 3 icônes apparaissent -->
<!-- Antef marche -->
<circle cx="100" cy="300" r="16" fill="#FAECE7" stroke="#D85A30" stroke-width="2"/>
<text x="100" y="304" text-anchor="middle" font-size="12" fill="#4A1B0C" font-weight="600">A</text>
<line x1="100" y1="316" x2="100" y2="345" stroke="#D85A30" stroke-width="2"/>
<line x1="110" y1="330" x2="130" y2="330" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Myt signale -->
<circle cx="200" cy="300" r="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.2"/>
<text x="200" y="304" text-anchor="middle" font-size="11" fill="#04342C" font-weight="500">M</text>
<rect x="220" y="260" width="100" height="30" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="270" y="275" text-anchor="middle" font-size="10" fill="#04342C">💡 « L'arbre là-bas</text>
<text x="270" y="287" text-anchor="middle" font-size="10" fill="#04342C">pleure. Allons voir. »</text>

<!-- Ounech a une idée -->
<circle cx="350" cy="300" r="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="350" y="304" text-anchor="middle" font-size="11" fill="#26215C" font-weight="500">O</text>
<rect x="370" y="260" width="100" height="30" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="420" y="275" text-anchor="middle" font-size="10" fill="#26215C">❗ « Je sens une</text>
<text x="420" y="287" text-anchor="middle" font-size="10" fill="#26215C">corruption ici. »</text>

<!-- Hesat veut le relais -->
<circle cx="500" cy="300" r="14" fill="#FBEAF0" stroke="#D4537E" stroke-width="1.2"/>
<text x="500" y="304" text-anchor="middle" font-size="11" fill="#72243E" font-weight="500">He</text>
<rect x="520" y="260" width="110" height="30" rx="6" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
<text x="575" y="275" text-anchor="middle" font-size="10" fill="#72243E">🔄 « Laisse-moi faire,</text>
<text x="575" y="287" text-anchor="middle" font-size="10" fill="#72243E">je vois un dieu. »</text>

<!-- Légende -->
<text x="340" y="365" text-anchor="middle" font-size="11" fill="#2C2C2A" font-weight="500">Les personnages non joués interviennent à tout moment : exploration, combat, dialogue.</text>
<text x="340" y="380" text-anchor="middle" font-size="11" fill="#888780" font-style="italic">Le joueur peut les faire intervenir via D-PAD ou les ignorer.</text>
</svg>