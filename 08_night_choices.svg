<svg width="1360" height="900" viewBox="0 0 680 450" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">
<text x="340" y="20" text-anchor="middle" font-size="14" fill="#2C2C2A" font-weight="600">Storyboard — La nuit : 3 choix par personnage</text>
<text x="340" y="38" font-size="11" fill="#888780" text-anchor="middle">22h–minuit. Le joueur décide pour chaque personnage.</text>

<!-- Option 1: Continuer (Anubis chasse) -->
<rect x="20" y="52" width="200" height="250" rx="8" fill="#F0F6FC" stroke="#378ADD" stroke-width="1.5"/>
<text x="120" y="72" text-anchor="middle" font-size="12" fill="#042C53" font-weight="600">🌙 Continuer</text>

<!-- Lune et toits -->
<circle cx="170" cy="100" r="12" fill="#FAC775" stroke="none"/>
<line x1="40" y1="200" x2="60" y2="160" stroke="#888780" stroke-width="1.5"/>
<line x1="60" y1="160" x2="80" y2="170" stroke="#888780" stroke-width="1.5"/>
<line x1="80" y1="170" x2="120" y2="140" stroke="#888780" stroke-width="1.5"/>
<line x1="120" y1="140" x2="140" y2="155" stroke="#888780" stroke-width="1.5"/>
<line x1="140" y1="155" x2="200" y2="200" stroke="#888780" stroke-width="1.5"/>
<rect x="40" y="200" width="160" height="30" fill="#F1EFE8" stroke="none"/>

<!-- Anubis sur un toit -->
<circle cx="100" cy="125" r="14" fill="#E6F1FB" stroke="#378ADD" stroke-width="2"/>
<text x="100" y="129" text-anchor="middle" font-size="11" fill="#185FA5" font-weight="600">An</text>
<line x1="100" y1="139" x2="100" y2="155" stroke="#378ADD" stroke-width="2"/>

<!-- NPC qui court -->
<circle cx="160" cy="190" r="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
<text x="160" y="194" text-anchor="middle" font-size="9" fill="#A32D2D">!</text>
<line x1="160" y1="200" x2="160" y2="215" stroke="#E24B4A" stroke-width="1"/>
<line x1="165" y1="215" x2="175" y2="220" stroke="#E24B4A" stroke-width="1"/>

<text x="120" y="245" text-anchor="middle" font-size="10" fill="#185FA5">Anubis traque ses proies</text>
<text x="120" y="258" text-anchor="middle" font-size="10" fill="#185FA5">NPC nocturnes, +XP</text>
<rect x="35" y="270" width="170" height="22" rx="4" fill="#FCEBEB" stroke="none"/>
<text x="120" y="285" text-anchor="middle" font-size="10" fill="#A32D2D" font-weight="500">⚠️ Pas de repos → SP ↓↓</text>

<!-- Option 2: Dormir -->
<rect x="240" y="52" width="200" height="250" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1.5"/>
<text x="340" y="72" text-anchor="middle" font-size="12" fill="#173404" font-weight="600">💤 Dormir</text>

<!-- Lit / personnage endormi -->
<rect x="280" y="155" width="120" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<circle cx="310" cy="155" r="14" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.2"/>
<text x="310" y="159" text-anchor="middle" font-size="11" fill="#854F0B" font-weight="500">H</text>
<text x="310" y="147" text-anchor="middle" font-size="14">💤</text>
<line x1="310" y1="169" x2="310" y2="195" stroke="#EF9F27" stroke-width="1"/>

<!-- Barres de regen -->
<rect x="280" y="215" width="120" height="15" rx="3" fill="#FAECE7" stroke="none"/>
<rect x="280" y="215" width="100" height="15" rx="3" fill="#97C459" stroke="none"/>
<text x="340" y="226" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">HP ████████░░</text>

<rect x="280" y="234" width="120" height="15" rx="3" fill="#E6F1FB" stroke="none"/>
<rect x="280" y="234" width="120" height="15" rx="3" fill="#378ADD" stroke="none"/>
<text x="340" y="245" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">SP ██████████ FULL</text>

<text x="340" y="270" text-anchor="middle" font-size="10" fill="#27500A">Regen HP + batterie + SP</text>
<text x="340" y="285" text-anchor="middle" font-size="10" fill="#27500A" font-weight="500">Seul moyen de récupérer SP</text>
<text x="340" y="295" text-anchor="middle" font-size="10" fill="#27500A">Bonus humeur + stats lendemain</text>

<!-- Option 3: Voyage astral -->
<rect x="460" y="52" width="200" height="250" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="560" y="72" text-anchor="middle" font-size="12" fill="#26215C" font-weight="600">🦅 Voyage astral</text>

<!-- Personnage endormi + Ba oiseau au dessus -->
<circle cx="520" cy="190" r="12" fill="#F1EFE8" stroke="#888780" stroke-width="0.5" opacity="0.5"/>
<text x="520" y="194" text-anchor="middle" font-size="10" fill="#888780">K</text>
<text x="520" y="210" font-size="9" fill="#888780" font-style="italic">dort</text>

<!-- Ba oiseau -->
<text x="560" y="120" text-anchor="middle" font-size="24">🦅</text>
<circle cx="560" cy="140" r="16" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="3 2"/>
<text x="560" y="144" text-anchor="middle" font-size="11" fill="#534AB7" font-weight="600">Ba</text>

<!-- Options Ba -->
<rect x="475" y="230" width="170" height="60" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="560" y="248" text-anchor="middle" font-size="10" fill="#3C3489">🎮 Mini-jeux (XP, items)</text>
<text x="560" y="262" text-anchor="middle" font-size="10" fill="#3C3489">⏪ Retour dans le passé</text>
<text x="560" y="276" text-anchor="middle" font-size="10" fill="#3C3489">💀 Sauver une âme morte</text>

<!-- Principe -->
<rect x="20" y="320" width="640" height="55" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="340" text-anchor="middle" font-size="12" fill="#2C2C2A" font-weight="500">Principe : rien n'est jamais gratuit</text>
<text x="340" y="358" text-anchor="middle" font-size="11" fill="#5F5E5A">Continuer = +XP mais pas de regen SP. Dormir = regen complète. Voyage astral = risques dans l'inframonde.</text>
<text x="340" y="372" text-anchor="middle" font-size="11" fill="#5F5E5A">Compromis : une demi-nuit de repos suffit pour récupérer raisonnablement.</text>

<!-- Note -->
<rect x="20" y="390" width="640" height="35" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="340" y="412" text-anchor="middle" font-size="11" fill="#633806" font-weight="500">⚠️ Le joueur choisit POUR CHAQUE PERSONNAGE — ils peuvent avoir des activités différentes la même nuit.</text>
</svg>