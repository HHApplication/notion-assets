<svg width="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="Arial, sans-serif">
  <defs>
    <style>
      .panel { fill: #FFF8E7; stroke: #2C1810; stroke-width: 3; rx: 12; }
      .num { font-size: 26px; font-weight: bold; fill: #C62828; }
      .label { font-size: 13px; font-weight: bold; fill: #2C1810; text-anchor: middle; }
      .body { stroke: #2C1810; stroke-width: 2.5; stroke-linecap: round; fill: none; }
    </style>
  </defs>
  <text x="600" y="30" font-size="22" font-weight="bold" fill="#C62828" text-anchor="middle">RÈGLES PHYSIQUES — PAS DE PLOT ARMOR</text>

  <!-- Panel 1: Fall damage -->
  <rect class="panel" x="15" y="50" width="380" height="340"/>
  <text class="num" x="30" y="80">1</text>
  <text x="205" y="78" font-size="14" font-weight="bold" fill="#C62828">CHUTE = BLESSURE</text>
  <!-- High ledge -->
  <rect x="80" y="100" width="120" height="15" fill="#8D6E63"/>
  <rect x="80" y="100" width="120" height="150" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
  <!-- Character falling -->
  <circle cx="220" cy="180" r="18" fill="#FFD54F" stroke="#2C1810" stroke-width="2"/>
  <text x="213" y="187" font-size="16">😱</text>
  <line class="body" x1="220" y1="198" x2="220" y2="235"/>
  <line class="body" x1="220" y1="215" x2="200" y2="205"/>
  <line class="body" x1="220" y1="215" x2="240" y2="205"/>
  <!-- Fall arrow -->
  <line x1="220" y1="240" x2="220" y2="290" stroke="#C62828" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="235" y="270" font-size="14" fill="#C62828">↓</text>
  <!-- Ground -->
  <rect x="18" y="290" width="374" height="30" fill="#E8D5B7"/>
  <!-- Impact -->
  <text x="210" y="305" font-size="16">💥</text>
  <!-- Consequence -->
  <rect x="40" y="325" width="330" height="35" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="60" y="348" font-size="11" fill="#B71C1C">🦵 Boite → ne peut plus courir | 💀 Ou pire</text>
  <text class="label" x="205" y="378">Hauteur = danger réel</text>

  <!-- Panel 2: Drowning -->
  <rect class="panel" x="410" y="50" width="380" height="340"/>
  <text class="num" x="425" y="80">2</text>
  <text x="600" y="78" font-size="14" font-weight="bold" fill="#2196F3">NOYADE POSSIBLE</text>
  <!-- Water -->
  <rect x="413" y="180" width="374" height="140" rx="0" fill="#42A5F5" opacity="0.3"/>
  <!-- Waves -->
  <path d="M413,180 Q445,170 480,180 Q515,190 550,180 Q585,170 620,180 Q655,190 690,180 Q725,170 760,180 Q787,190 787,180" fill="none" stroke="#1E88E5" stroke-width="2"/>
  <!-- Character drowning -->
  <circle cx="570" cy="200" r="18" fill="#FFD54F" stroke="#2C1810" stroke-width="2"/>
  <text x="562" y="208" font-size="16">😵</text>
  <!-- Bubbles -->
  <circle cx="585" cy="220" r="4" fill="white" opacity="0.5"/>
  <circle cx="575" cy="235" r="3" fill="white" opacity="0.4"/>
  <circle cx="590" cy="250" r="5" fill="white" opacity="0.3"/>
  <!-- Hand reaching up -->
  <line x1="570" y1="180" x2="565" y2="160" stroke="#2C1810" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Timer -->
  <rect x="440" y="110" width="120" height="40" rx="6" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="460" y="135" font-size="12" fill="#1565C0" font-weight="bold">⏱️ Oxygène ↓</text>
  <!-- Consequence -->
  <rect x="435" y="325" width="330" height="35" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="455" y="348" font-size="11" fill="#B71C1C">💀 Pas de gill → noyade réelle | HP → 0</text>
  <text class="label" x="600" y="378">L'eau tue</text>

  <!-- Panel 3: Disease -->
  <rect class="panel" x="805" y="50" width="380" height="340"/>
  <text class="num" x="820" y="80">3</text>
  <text x="995" y="78" font-size="14" font-weight="bold" fill="#FF8F00">MALADIE / BLESSURE</text>
  <!-- Character sick -->
  <circle cx="950" cy="180" r="22" fill="#FFD54F" stroke="#2C1810" stroke-width="2"/>
  <text x="941" y="188" font-size="20">🤢</text>
  <line x1="950" y1="202" x2="950" y2="250" stroke="#2C1810" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="950" y1="225" x2="925" y2="240" stroke="#2C1810" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="950" y1="225" x2="975" y2="240" stroke="#2C1810" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sick indicators -->
  <text x="985" y="170" font-size="14">🤒</text>
  <text x="910" y="165" font-size="12">💫</text>
  <!-- Effects cascade -->
  <rect x="830" y="270" width="330" height="85" rx="8" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="850" y="292" font-size="11" fill="#E65100" font-weight="bold">Effets en cascade :</text>
  <text x="850" y="312" font-size="10" fill="#E65100">😷 Moral ↓ → SP ↓ → humeur ↓</text>
  <text x="850" y="332" font-size="10" fill="#E65100">🤕 Paralysie possible → immobile</text>
  <text x="850" y="348" font-size="10" fill="#E65100">🚫 Combat dégradé → vulnérable</text>
  <text class="label" x="995" y="378">Fragiles face à la Nature</text>
</svg>