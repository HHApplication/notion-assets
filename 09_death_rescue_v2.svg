<svg width="1400" height="700" viewBox="0 0 700 350" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">

<text x="350" y="22" text-anchor="middle" font-size="15" fill="#2C2C2A" font-weight="700">Un personnage meurt (0 HP). Comment sauver son âme ?</text>

<!-- CASE 1: Tombe -->
<rect x="10" y="38" width="130" height="145" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="2"/>
<!-- Hetep qui tombe -->
<circle cx="75" cy="80" r="22" fill="#FCEBEB" stroke="#E24B4A" stroke-width="3"/>
<text x="75" y="88" text-anchor="middle" font-size="15" fill="#A32D2D" font-weight="700">H</text>
<text x="75" y="68" text-anchor="middle" font-size="14">💀</text>
<line x1="75" y1="102" x2="75" y2="130" stroke="#E24B4A" stroke-width="2.5"/>
<line x1="60" y1="115" x2="90" y2="115" stroke="#E24B4A" stroke-width="2.5"/>
<!-- HP à 0 -->
<rect x="25" y="140" width="100" height="12" rx="3" fill="#501313"/>
<text x="75" y="150" text-anchor="middle" font-size="8" fill="#E24B4A">HP ░░░░░░░ 0</text>
<text x="75" y="172" text-anchor="middle" font-size="11" fill="#A32D2D" font-weight="600">💀 Tombe</text>

<!-- Flèche -->
<text x="150" y="110" font-size="18" fill="#888780">→</text>

<!-- CASE 2: Fantôme aide encore -->
<rect x="160" y="38" width="130" height="145" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="2"/>
<!-- Fantôme translucide -->
<circle cx="225" cy="80" r="22" fill="none" stroke="#378ADD" stroke-width="2.5" stroke-dasharray="4 3"/>
<text x="225" y="75" text-anchor="middle" font-size="22">👻</text>
<!-- Corps au sol -->
<circle cx="210" cy="140" r="8" fill="#F1EFE8" stroke="#888780" stroke-width="1" opacity="0.4"/>
<text x="240" y="145" font-size="8" fill="#888780" opacity="0.5">corps</text>
<text x="225" y="172" text-anchor="middle" font-size="10" fill="#185FA5" font-weight="600">👻 Fantôme</text>
<text x="225" y="183" text-anchor="middle" font-size="9" fill="#185FA5">aide encore</text>

<!-- Flèche -->
<text x="300" y="110" font-size="18" fill="#888780">→</text>

<!-- CASE 3: Ba s'enfuit -->
<rect x="310" y="38" width="130" height="145" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/>
<!-- Oiseau qui fuit vers le haut -->
<text x="375" y="72" text-anchor="middle" font-size="28">🦅</text>
<text x="375" y="55" text-anchor="middle" font-size="14" fill="#534AB7">↑↑↑</text>
<text x="375" y="120" text-anchor="middle" font-size="11" fill="#534AB7" font-weight="600">Ba s'enfuit</text>
<text x="375" y="135" text-anchor="middle" font-size="10" fill="#534AB7">→ inframonde</text>
<!-- Timer -->
<rect x="328" y="150" width="95" height="22" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
<text x="375" y="165" text-anchor="middle" font-size="10" fill="#E24B4A" font-weight="600">⏱️ VITE !</text>

<!-- Flèche -->
<text x="450" y="110" font-size="18" fill="#888780">→</text>

<!-- CASE 4: Porter le corps -->
<rect x="460" y="38" width="230" height="145" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="2"/>
<!-- Antef porte Hetep -->
<circle cx="520" cy="90" r="22" fill="#FAECE7" stroke="#D85A30" stroke-width="2.5"/>
<text x="520" y="98" text-anchor="middle" font-size="15" fill="#4A1B0C" font-weight="700">A</text>
<line x1="520" y1="112" x2="520" y2="145" stroke="#D85A30" stroke-width="3"/>
<line x1="500" y1="128" x2="540" y2="128" stroke="#D85A30" stroke-width="3"/>
<!-- Corps sur le dos -->
<circle cx="545" cy="85" r="12" fill="#F1EFE8" stroke="#888780" stroke-width="1" opacity="0.5"/>
<text x="545" y="89" text-anchor="middle" font-size="10" fill="#888780">H</text>
<!-- Véhicule alternative -->
<text x="600" y="115" font-size="10" fill="#854F0B">ou</text>
<text x="640" y="100" text-anchor="middle" font-size="24">🚗</text>
<text x="640" y="118" text-anchor="middle" font-size="10" fill="#854F0B">véhicule</text>

<text x="575" y="160" text-anchor="middle" font-size="11" fill="#633806" font-weight="600">Transporter le corps</text>
<text x="575" y="175" text-anchor="middle" font-size="10" fill="#633806">Attendre la nuit</text>

<!-- CASE 5: Descente dans l'inframonde (grande case en bas) -->
<rect x="10" y="195" width="680" height="145" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/>
<text x="350" y="218" text-anchor="middle" font-size="14" fill="#26215C" font-weight="700">🌙 La nuit : descente dans l'inframonde pour sauver Ba</text>

<!-- Ba oiseau cherché -->
<text x="80" y="280" text-anchor="middle" font-size="28">🦅</text>
<text x="80" y="260" text-anchor="middle" font-size="10" fill="#534AB7">chercher Ba</text>

<!-- Parcours avec obstacles (ennemis spirites) -->
<line x1="110" y1="275" x2="580" y2="275" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="8 4"/>
<!-- Ennemis -->
<circle cx="180" cy="270" r="16" fill="#2C2C2A" stroke="#E24B4A" stroke-width="1.5"/>
<text x="180" y="276" text-anchor="middle" font-size="13">👹</text>
<circle cx="280" cy="275" r="14" fill="#2C2C2A" stroke="#E24B4A" stroke-width="1.5"/>
<text x="280" y="281" text-anchor="middle" font-size="12">👻</text>
<circle cx="370" cy="268" r="16" fill="#2C2C2A" stroke="#E24B4A" stroke-width="1.5"/>
<text x="370" y="274" text-anchor="middle" font-size="13">👹</text>
<circle cx="460" cy="278" r="14" fill="#2C2C2A" stroke="#E24B4A" stroke-width="1.5"/>
<text x="460" y="284" text-anchor="middle" font-size="12">💀</text>

<!-- Antichambre au bout -->
<rect x="590" y="240" width="90" height="70" rx="8" fill="#2C2C2A" stroke="#E24B4A" stroke-width="2"/>
<text x="635" y="265" text-anchor="middle" font-size="12" fill="#E24B4A" font-weight="600">Grand</text>
<text x="635" y="280" text-anchor="middle" font-size="12" fill="#E24B4A" font-weight="600">Tribunal</text>
<text x="635" y="298" text-anchor="middle" font-size="10" fill="#E24B4A">FERMÉ 🔒</text>

<!-- Warning -->
<text x="350" y="330" text-anchor="middle" font-size="12" fill="#A32D2D" font-weight="600">⚠️ Plus tu attends → plus l'âme est sauvage → plus c'est dur</text>
</svg>