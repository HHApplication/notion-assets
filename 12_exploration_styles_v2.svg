<svg width="1400" height="520" viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">

<!-- TITRE -->
<text x="350" y="22" text-anchor="middle" font-size="15" fill="#2C2C2A" font-weight="700">Un mur bloque le passage. Qui envoyer ?</text>

<!-- ===== HETEP : EXPLOSE ===== -->
<rect x="10" y="38" width="220" height="210" rx="8" fill="#FFF8F0" stroke="#EF9F27" stroke-width="2"/>

<!-- Hetep gros bonhomme -->
<circle cx="80" cy="120" r="24" fill="#FAEEDA" stroke="#EF9F27" stroke-width="2.5"/>
<text x="80" y="128" text-anchor="middle" font-size="18" fill="#854F0B" font-weight="700">H</text>
<!-- Corps -->
<line x1="80" y1="144" x2="80" y2="185" stroke="#EF9F27" stroke-width="3"/>
<line x1="60" y1="165" x2="100" y2="165" stroke="#EF9F27" stroke-width="3"/>
<line x1="68" y1="185" x2="58" y2="210" stroke="#EF9F27" stroke-width="3"/>
<line x1="92" y1="185" x2="102" y2="210" stroke="#EF9F27" stroke-width="3"/>
<!-- Bras qui lance -->
<line x1="100" y1="165" x2="135" y2="140" stroke="#EF9F27" stroke-width="3"/>

<!-- Dynamite -->
<rect x="135" y="128" width="18" height="24" rx="3" fill="#E24B4A" stroke="#A32D2D" stroke-width="1.5"/>
<line x1="144" y1="128" x2="148" y2="115" stroke="#2C2C2A" stroke-width="1.5"/>
<text x="152" y="113" font-size="12" fill="#E24B4A">💥</text>

<!-- Mur qui explose -->
<rect x="168" y="100" width="45" height="80" rx="2" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
<line x1="175" y1="130" x2="205" y2="145" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="4 3"/>
<line x1="180" y1="115" x2="200" y2="140" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="190" y="165" text-anchor="middle" font-size="20">💥</text>

<!-- Label -->
<text x="115" y="235" text-anchor="middle" font-size="14" fill="#854F0B" font-weight="600">💣 BOOM !</text>
<text x="115" y="248" text-anchor="middle" font-size="11" fill="#A32D2D">Bruyant → alerte</text>

<!-- ===== ANUBIS : GRAPPIN ===== -->
<rect x="240" y="38" width="220" height="210" rx="8" fill="#F0F6FC" stroke="#378ADD" stroke-width="2"/>

<!-- Mur -->
<rect x="370" y="70" width="45" height="140" rx="2" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>

<!-- Anubis en haut du mur -->
<circle cx="340" cy="80" r="24" fill="#E6F1FB" stroke="#378ADD" stroke-width="2.5"/>
<text x="340" y="88" text-anchor="middle" font-size="16" fill="#185FA5" font-weight="700">An</text>
<!-- Corps accroché -->
<line x1="340" y1="104" x2="340" y2="135" stroke="#378ADD" stroke-width="3"/>
<line x1="325" y1="118" x2="365" y2="108" stroke="#378ADD" stroke-width="3"/>
<!-- Corde du grappin -->
<line x1="365" y1="108" x2="395" y2="72" stroke="#378ADD" stroke-width="2" stroke-dasharray="5 3"/>
<text x="398" y="68" font-size="12">🪝</text>
<!-- Jambes -->
<line x1="332" y1="135" x2="325" y2="158" stroke="#378ADD" stroke-width="3"/>
<line x1="348" y1="135" x2="355" y2="158" stroke="#378ADD" stroke-width="3"/>

<!-- Flèche par dessus -->
<path d="M310 75 C310 45 420 45 420 75" fill="none" stroke="#378ADD" stroke-width="2" stroke-dasharray="4 3"/>
<text x="430" y="80" font-size="14" fill="#378ADD">→</text>

<!-- Label -->
<text x="350" y="235" text-anchor="middle" font-size="14" fill="#185FA5" font-weight="600">🪝 Par le toit</text>
<text x="350" y="248" text-anchor="middle" font-size="11" fill="#27500A">Discret ✓</text>

<!-- ===== KAHAY : PIRATE ===== -->
<rect x="470" y="38" width="220" height="210" rx="8" fill="#FFF0F5" stroke="#D4537E" stroke-width="2"/>

<!-- Kahay devant un panneau -->
<circle cx="530" cy="120" r="24" fill="#FBEAF0" stroke="#D4537E" stroke-width="2.5"/>
<text x="530" y="128" text-anchor="middle" font-size="18" fill="#993556" font-weight="700">K</text>
<!-- Corps -->
<line x1="530" y1="144" x2="530" y2="185" stroke="#D4537E" stroke-width="3"/>
<line x1="510" y1="165" x2="550" y2="165" stroke="#D4537E" stroke-width="3"/>
<line x1="518" y1="185" x2="510" y2="210" stroke="#D4537E" stroke-width="3"/>
<line x1="542" y1="185" x2="550" y2="210" stroke="#D4537E" stroke-width="3"/>
<!-- Bras vers panneau -->
<line x1="550" y1="165" x2="590" y2="145" stroke="#D4537E" stroke-width="2.5"/>

<!-- Panneau de commande -->
<rect x="585" y="110" width="50" height="55" rx="4" fill="#2C2C2A" stroke="#D4537E" stroke-width="1.5"/>
<text x="610" y="132" text-anchor="middle" font-size="8" fill="#97C459">████</text>
<text x="610" y="144" text-anchor="middle" font-size="8" fill="#97C459">█░██</text>
<text x="610" y="156" text-anchor="middle" font-size="8" fill="#97C459">████</text>

<!-- Ondes de piratage -->
<circle cx="585" cy="140" r="12" fill="none" stroke="#D4537E" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.6"/>
<circle cx="585" cy="140" r="20" fill="none" stroke="#D4537E" stroke-width="0.5" stroke-dasharray="3 2" opacity="0.3"/>

<!-- Porte qui s'ouvre -->
<rect x="645" y="100" width="35" height="80" rx="2" fill="#F1EFE8" stroke="#97C459" stroke-width="2"/>
<text x="662" y="145" text-anchor="middle" font-size="16">🔓</text>

<!-- Label -->
<text x="580" y="235" text-anchor="middle" font-size="14" fill="#993556" font-weight="600">📡 Hacké !</text>
<text x="580" y="248" text-anchor="middle" font-size="11" fill="#854F0B">Coûte SP + batterie</text>
</svg>