<svg width="1360" height="1100" viewBox="0 0 680 550" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">

<!-- TITRE -->
<text x="340" y="22" text-anchor="middle" font-size="16" fill="#2C2C2A" font-weight="600">Project M — Boucle de jeu principale</text>

<!-- JOUR -->
<rect x="40" y="40" width="280" height="40" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="180" y="65" text-anchor="middle" font-size="13" fill="#412402" font-weight="500">Journée (5 périodes)</text>

<line x1="180" y1="80" x2="180" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/></marker></defs>

<!-- 3 piliers -->
<rect x="40" y="108" width="130" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="105" y="128" text-anchor="middle" font-size="13" fill="#04342C" font-weight="500">Exploration</text>
<text x="105" y="147" text-anchor="middle" font-size="11" fill="#0F6E56">Fields, carte 3D</text>

<rect x="185" y="108" width="130" height="52" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="250" y="128" text-anchor="middle" font-size="13" fill="#4A1B0C" font-weight="500">Combat</text>
<text x="250" y="147" text-anchor="middle" font-size="11" fill="#993C1D">HP, SP, AP</text>

<rect x="330" y="108" width="130" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="395" y="128" text-anchor="middle" font-size="13" fill="#26215C" font-weight="500">Dialogue</text>
<text x="395" y="147" text-anchor="middle" font-size="11" fill="#534AB7">Tour par tour</text>

<!-- Flèches -->
<line x1="105" y1="160" x2="105" y2="188" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<line x1="250" y1="160" x2="250" y2="188" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<line x1="395" y1="160" x2="395" y2="188" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- Quêtes -->
<rect x="40" y="188" width="420" height="40" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="250" y="213" text-anchor="middle" font-size="13" fill="#2C2C2A" font-weight="500">Quêtes, missions, événements (unités de temps)</text>

<line x1="250" y1="228" x2="250" y2="262" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- NUIT -->
<rect x="40" y="262" width="420" height="40" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="250" y="287" text-anchor="middle" font-size="13" fill="#042C53" font-weight="500">Nuit — choix par personnage</text>

<line x1="105" y1="302" x2="105" y2="330" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<line x1="250" y1="302" x2="250" y2="330" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<line x1="395" y1="302" x2="395" y2="330" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- 3 options nuit -->
<rect x="40" y="330" width="130" height="65" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="105" y="352" text-anchor="middle" font-size="13" fill="#412402" font-weight="500">Continuer</text>
<text x="105" y="370" text-anchor="middle" font-size="11" fill="#854F0B">Missions nocturnes</text>
<text x="105" y="385" text-anchor="middle" font-size="11" fill="#854F0B">+XP, -repos</text>

<rect x="185" y="330" width="130" height="65" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="250" y="352" text-anchor="middle" font-size="13" fill="#04342C" font-weight="500">Dormir</text>
<text x="250" y="370" text-anchor="middle" font-size="11" fill="#0F6E56">Seul regen SP</text>
<text x="250" y="385" text-anchor="middle" font-size="11" fill="#0F6E56">HP + batterie</text>

<rect x="330" y="330" width="130" height="65" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="395" y="352" text-anchor="middle" font-size="13" fill="#26215C" font-weight="500">Voyage astral</text>
<text x="395" y="370" text-anchor="middle" font-size="11" fill="#534AB7">Ba (oiseau)</text>
<text x="395" y="385" text-anchor="middle" font-size="11" fill="#534AB7">Passé, sauvetage</text>

<!-- Chapitre suivant -->
<line x1="250" y1="395" x2="250" y2="425" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<rect x="140" y="425" width="220" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="250" y="450" text-anchor="middle" font-size="13" fill="#2C2C2A" font-weight="500">Chapitre suivant</text>

<!-- Boucle retour -->
<path d="M140 445 L25 445 L25 60 L38 60" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arr)"/>
<text x="15" y="260" text-anchor="middle" font-size="11" fill="#888780" transform="rotate(-90,15,260)">Boucle quotidienne</text>

<!-- SHIFT+ colonne droite -->
<rect x="500" y="108" width="155" height="287" rx="12" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
<text x="577" y="132" text-anchor="middle" font-size="13" fill="#4B1528" font-weight="500">[SHIFT+]</text>
<text x="577" y="155" text-anchor="middle" font-size="11" fill="#993556">Monde du Ba</text>
<text x="577" y="178" text-anchor="middle" font-size="11" fill="#993556">Scan NPC</text>
<text x="577" y="201" text-anchor="middle" font-size="11" fill="#993556">Navigation RA</text>
<text x="577" y="224" text-anchor="middle" font-size="11" fill="#993556">Ennemis spirites</text>
<text x="577" y="247" text-anchor="middle" font-size="11" fill="#993556">Essences émotionnelles</text>
<text x="577" y="270" text-anchor="middle" font-size="11" fill="#993556">Batterie / SP</text>
<text x="577" y="293" text-anchor="middle" font-size="11" fill="#993556">Projection mission</text>
<text x="577" y="316" text-anchor="middle" font-size="11" fill="#993556">Virtualisation</text>
<text x="577" y="339" text-anchor="middle" font-size="11" fill="#993556">Sauvetage d'âmes</text>
<text x="577" y="375" text-anchor="middle" font-size="11" fill="#993556" font-weight="500" font-style="italic">Actif en overlay</text>
<text x="577" y="388" text-anchor="middle" font-size="11" fill="#993556" font-style="italic">permanent</text>

<line x1="460" y1="134" x2="498" y2="134" stroke="#D4537E" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>

<!-- Légende -->
<text x="340" y="500" text-anchor="middle" font-size="12" fill="#5F5E5A" font-style="italic">Le joueur maîtrise entièrement son rythme. Rien n'est jamais gratuit.</text>
<text x="340" y="520" text-anchor="middle" font-size="11" fill="#888780">🖼️ Réf: Game Concept original — notion.com/p/30a4ebdc39a380ef85d4d0b5da0ef801</text>
</svg>