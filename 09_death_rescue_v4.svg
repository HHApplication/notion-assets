<svg width="100%" width="1400" height="1600" viewBox="0 0 700 800" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #fff;">

<text x="350" y="24" text-anchor="middle" font-size="16" fill="#2C2C2A" font-weight="700">Quand un personnage meurt — étape par étape</text>

<!-- ==================== CASE 1 : IL TOMBE ==================== -->
<rect x="15" y="40" width="330" height="190" rx="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="2"/>
<rect x="20" y="44" width="50" height="24" rx="5" fill="#E24B4A"/>
<text x="45" y="61" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">1</text>

<line x1="40" y1="190" x2="320" y2="190" stroke="#B4B2A9" stroke-width="2"/>
<!-- Personnage allongé au sol avec yeux en X -->
<circle cx="130" cy="175" r="20" fill="#FAEEDA" stroke="#E24B4A" stroke-width="2.5"/>
<line x1="122" y1="168" x2="132" y2="178" stroke="#A32D2D" stroke-width="2.5"/>
<line x1="132" y1="168" x2="122" y2="178" stroke="#A32D2D" stroke-width="2.5"/>
<line x1="128" y1="168" x2="138" y2="178" stroke="#A32D2D" stroke-width="2.5"/>
<line x1="138" y1="168" x2="128" y2="178" stroke="#A32D2D" stroke-width="2.5"/>
<line x1="150" y1="180" x2="220" y2="185" stroke="#EF9F27" stroke-width="3"/>
<line x1="160" y1="175" x2="190" y2="165" stroke="#EF9F27" stroke-width="3"/>
<line x1="220" y1="185" x2="250" y2="195" stroke="#EF9F27" stroke-width="3"/>
<line x1="220" y1="185" x2="240" y2="175" stroke="#EF9F27" stroke-width="3"/>
<rect x="50" y="80" width="200" height="22" rx="6" fill="#501313" stroke="#E24B4A" stroke-width="1"/>
<text x="150" y="96" text-anchor="middle" font-size="12" fill="#E24B4A" font-weight="700">❤️ HP ░░░░░░░░░░░░░░ 0</text>
<text x="175" y="220" text-anchor="middle" font-size="16" fill="#A32D2D" font-weight="700">Il est mort.</text>

<!-- ==================== CASE 2 : FANTÔME SORT ==================== -->
<rect x="355" y="40" width="330" height="190" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="2"/>
<rect x="360" y="44" width="50" height="24" rx="5" fill="#378ADD"/>
<text x="385" y="61" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">2</text>

<circle cx="430" cy="195" r="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1" opacity="0.4"/>
<line x1="442" y1="198" x2="475" y2="200" stroke="#B4B2A9" stroke-width="2" opacity="0.3"/>
<ellipse cx="530" cy="130" rx="40" ry="50" fill="none" stroke="#378ADD" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
<circle cx="530" cy="110" r="24" fill="#E6F1FB" stroke="#378ADD" stroke-width="2.5"/>
<circle cx="522" cy="106" r="4" fill="#185FA5"/>
<circle cx="538" cy="106" r="4" fill="#185FA5"/>
<ellipse cx="530" cy="120" rx="6" ry="4" fill="#185FA5"/>
<path d="M505 160 Q510 180 520 175 Q530 185 540 175 Q550 180 555 160" fill="none" stroke="#378ADD" stroke-width="2" stroke-dasharray="4 3"/>
<text x="520" y="220" text-anchor="middle" font-size="16" fill="#185FA5" font-weight="700">Son fantôme sort du corps.</text>

<!-- ==================== CASE 3 : L'ÂME S'ENFUIT ==================== -->
<rect x="15" y="245" width="330" height="190" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/>
<rect x="20" y="249" width="50" height="24" rx="5" fill="#534AB7"/>
<text x="45" y="266" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">3</text>

<text x="100" y="340" text-anchor="middle" font-size="56">🦅</text>
<line x1="55" y1="320" x2="25" y2="320" stroke="#534AB7" stroke-width="2"/>
<line x1="60" y1="335" x2="20" y2="335" stroke="#534AB7" stroke-width="1.5"/>
<line x1="55" y1="350" x2="30" y2="350" stroke="#534AB7" stroke-width="1"/>
<line x1="140" y1="320" x2="260" y2="290" stroke="#534AB7" stroke-width="3" stroke-dasharray="8 5"/>
<text x="280" y="295" font-size="14" fill="#534AB7" font-weight="600">→ inframonde</text>
<rect x="170" y="350" width="150" height="40" rx="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="2"/>
<text x="245" y="375" text-anchor="middle" font-size="16" fill="#E24B4A" font-weight="700">⏱️ VITE !</text>
<text x="175" y="425" text-anchor="middle" font-size="15" fill="#534AB7" font-weight="700">L'âme s'enfuit. Faut la rattraper !</text>

<!-- ==================== CASE 4 : PORTER LE CORPS ==================== -->
<rect x="355" y="245" width="330" height="190" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="2"/>
<rect x="360" y="249" width="50" height="24" rx="5" fill="#EF9F27"/>
<text x="385" y="266" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">4</text>

<line x1="380" y1="400" x2="660" y2="400" stroke="#B4B2A9" stroke-width="2"/>
<circle cx="470" cy="330" r="22" fill="#FAECE7" stroke="#D85A30" stroke-width="3"/>
<circle cx="462" cy="325" r="3" fill="#4A1B0C"/>
<circle cx="478" cy="325" r="3" fill="#4A1B0C"/>
<line x1="462" y1="340" x2="478" y2="340" stroke="#4A1B0C" stroke-width="2" stroke-linecap="round"/>
<line x1="470" y1="352" x2="470" y2="385" stroke="#D85A30" stroke-width="3"/>
<line x1="455" y1="368" x2="485" y2="365" stroke="#D85A30" stroke-width="3"/>
<line x1="458" y1="385" x2="450" y2="400" stroke="#D85A30" stroke-width="3"/>
<line x1="482" y1="385" x2="490" y2="400" stroke="#D85A30" stroke-width="3"/>
<circle cx="495" cy="320" r="14" fill="#FAEEDA" stroke="#888780" stroke-width="1.5" opacity="0.6"/>
<line x1="489" y1="316" x2="495" y2="322" stroke="#888780" stroke-width="1.5" opacity="0.5"/>
<line x1="495" y1="316" x2="501" y2="322" stroke="#888780" stroke-width="1.5" opacity="0.5"/>
<line x1="495" y1="334" x2="510" y2="350" stroke="#888780" stroke-width="2" opacity="0.5"/>
<circle cx="620" cy="280" r="18" fill="#FAC775" stroke="none"/>
<text x="520" y="425" text-anchor="middle" font-size="15" fill="#854F0B" font-weight="700">Porter le corps. Attendre la nuit.</text>

<!-- ==================== CASE 5 : L'ANTICHAMBRE — REDESIGN v4 ==================== -->
<rect x="15" y="450" width="670" height="335" rx="10" fill="#1a1a2e" stroke="#534AB7" stroke-width="2.5"/>
<rect x="20" y="454" width="50" height="24" rx="5" fill="#534AB7"/>
<text x="45" y="471" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">5</text>
<text x="350" y="488" text-anchor="middle" font-size="16" fill="#85B7EB" font-weight="700">🌙 La nuit : descendre chercher l'âme dans l'inframonde</text>

<!-- PORTE DU TRIBUNAL avec Osiris visible derrière -->
<rect x="540" y="510" width="130" height="170" rx="8" fill="#1a1a2e" stroke="#EF9F27" stroke-width="2"/>
<!-- Barreaux / grille (tribunal visible mais fermé) -->
<line x1="565" y1="510" x2="565" y2="680" stroke="#EF9F27" stroke-width="1.5" opacity="0.5"/>
<line x1="595" y1="510" x2="595" y2="680" stroke="#EF9F27" stroke-width="1.5" opacity="0.5"/>
<line x1="625" y1="510" x2="625" y2="680" stroke="#EF9F27" stroke-width="1.5" opacity="0.5"/>
<line x1="645" y1="510" x2="645" y2="680" stroke="#EF9F27" stroke-width="1.5" opacity="0.5"/>
<!-- Osiris assis derrière (silhouette dorée, on le voit mais il ne bouge pas) -->
<circle cx="605" cy="560" r="20" fill="none" stroke="#FAC775" stroke-width="2" opacity="0.4"/>
<line x1="605" y1="580" x2="605" y2="620" stroke="#FAC775" stroke-width="2" opacity="0.4"/>
<line x1="590" y1="595" x2="620" y2="595" stroke="#FAC775" stroke-width="2" opacity="0.4"/>
<!-- Couronne d'Osiris -->
<rect x="597" y="534" width="16" height="14" rx="2" fill="none" stroke="#FAC775" stroke-width="1.5" opacity="0.4"/>
<text x="605" y="548" text-anchor="middle" font-size="8" fill="#FAC775" opacity="0.5">👑</text>
<!-- Label -->
<text x="605" y="650" text-anchor="middle" font-size="11" fill="#EF9F27" font-weight="600">Osiris</text>
<text x="605" y="665" text-anchor="middle" font-size="10" fill="#EF9F27">Le juge.</text>
<text x="605" y="678" text-anchor="middle" font-size="10" fill="#E24B4A" font-weight="600">Ne juge plus.</text>

<!-- Grosse chaîne + cadenas -->
<text x="540" y="600" font-size="28">🔒</text>
<text x="528" y="575" font-size="12" fill="#E24B4A">⛓️⛓️</text>

<!-- FILE D'ATTENTE D'ÂMES — de calme à fou -->
<!-- Âme 1 : calme (vient d'arriver) -->
<circle cx="480" cy="580" r="16" fill="#1a1a2e" stroke="#85B7EB" stroke-width="1.5"/>
<circle cx="475" cy="576" r="2" fill="#85B7EB"/>
<circle cx="485" cy="576" r="2" fill="#85B7EB"/>
<path d="M475 585 Q480 589 485 585" fill="none" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round"/>
<text x="480" y="610" text-anchor="middle" font-size="9" fill="#85B7EB">calme</text>

<!-- Âme 2 : ton ami Hetep (encore récupérable) -->
<circle cx="410" cy="575" r="20" fill="#FAEEDA" stroke="#EF9F27" stroke-width="2.5"/>
<circle cx="403" cy="570" r="3" fill="#854F0B"/>
<circle cx="417" cy="570" r="3" fill="#854F0B"/>
<path d="M403 582 Q410 578 417 582" fill="none" stroke="#854F0B" stroke-width="2" stroke-linecap="round"/>
<text x="410" y="555" text-anchor="middle" font-size="11" fill="#EF9F27" font-weight="700">← TON AMI</text>
<text x="410" y="610" text-anchor="middle" font-size="9" fill="#EF9F27">inquiet</text>

<!-- Âme 3 : en colère (attend depuis longtemps) -->
<circle cx="340" cy="580" r="16" fill="#1a1a2e" stroke="#E24B4A" stroke-width="1.5"/>
<circle cx="334" cy="575" r="2.5" fill="#E24B4A"/>
<circle cx="346" cy="575" r="2.5" fill="#E24B4A"/>
<line x1="334" y1="586" x2="346" y2="586" stroke="#E24B4A" stroke-width="2"/>
<text x="340" y="610" text-anchor="middle" font-size="9" fill="#E24B4A">furieux</text>

<!-- Âme 4 : fou furieux (attend depuis très longtemps) -->
<circle cx="270" cy="575" r="18" fill="#501313" stroke="#E24B4A" stroke-width="2.5"/>
<!-- Yeux zigzag = fou -->
<line x1="260" y1="568" x2="265" y2="573" stroke="#E24B4A" stroke-width="2"/>
<line x1="265" y1="573" x2="270" y2="568" stroke="#E24B4A" stroke-width="2"/>
<line x1="275" y1="568" x2="280" y2="573" stroke="#E24B4A" stroke-width="2"/>
<line x1="280" y1="573" x2="285" y2="568" stroke="#E24B4A" stroke-width="2"/>
<!-- Bouche qui hurle -->
<ellipse cx="272" cy="584" rx="6" ry="5" fill="#E24B4A"/>
<text x="270" y="610" text-anchor="middle" font-size="9" fill="#E24B4A" font-weight="600">DÉMENT</text>

<!-- Âme 5 : complètement perdu, irrémédiable -->
<circle cx="200" cy="580" r="16" fill="#2C2C2A" stroke="#E24B4A" stroke-width="2" stroke-dasharray="3 2"/>
<text x="200" y="586" text-anchor="middle" font-size="16">🌀</text>
<text x="200" y="610" text-anchor="middle" font-size="9" fill="#E24B4A">perdu</text>

<!-- Flèche du temps : plus on attend... -->
<line x1="200" y1="635" x2="480" y2="635" stroke="#E24B4A" stroke-width="2"/>
<polygon points="195,630 195,640 185,635" fill="#E24B4A"/>
<polygon points="485,630 485,640 495,635" fill="#85B7EB"/>
<text x="240" y="653" font-size="10" fill="#E24B4A" font-weight="600">attend depuis longtemps</text>
<text x="440" y="653" font-size="10" fill="#85B7EB" font-weight="600">vient d'arriver</text>

<!-- TOI : Ba oiseau qui arrive pour le sauver -->
<text x="80" y="580" text-anchor="middle" font-size="44">🦅</text>
<text x="80" y="615" text-anchor="middle" font-size="12" fill="#85B7EB" font-weight="600">TOI</text>
<!-- Flèche vers ton ami -->
<line x1="110" y1="580" x2="385" y2="578" stroke="#EF9F27" stroke-width="2" stroke-dasharray="6 4"/>
<text x="250" y="570" text-anchor="middle" font-size="11" fill="#EF9F27" font-weight="600">→ va le chercher !</text>

<!-- Monstres sur le chemin -->
<circle cx="155" cy="540" r="14" fill="#2C2C2A" stroke="#E24B4A" stroke-width="2"/>
<text x="155" y="546" text-anchor="middle" font-size="14">👹</text>
<circle cx="310" cy="535" r="14" fill="#2C2C2A" stroke="#E24B4A" stroke-width="2"/>
<text x="310" y="541" text-anchor="middle" font-size="14">👻</text>

<!-- Explications visuelles -->
<rect x="30" y="670" width="490" height="55" rx="8" fill="#501313"/>
<text x="275" y="690" text-anchor="middle" font-size="13" fill="#E24B4A" font-weight="700">Le tribunal d'Osiris est FERMÉ. Personne n'est jugé.</text>
<text x="275" y="708" text-anchor="middle" font-size="12" fill="#E24B4A">Les âmes s'entassent et deviennent folles. Plus tu attends, plus ton ami dégénère.</text>

<!-- Incitation -->
<rect x="30" y="738" width="490" height="32" rx="8" fill="#FAEEDA"/>
<text x="275" y="759" text-anchor="middle" font-size="13" fill="#854F0B" font-weight="700">💡 Dépêche-toi d'aller le chercher avant qu'il ne devienne comme les autres !</text>
</svg>