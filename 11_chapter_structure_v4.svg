<svg width="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="Arial, sans-serif">
  <defs>
    <style>
      .panel { fill: #FFF8E7; stroke: #2C1810; stroke-width: 3; rx: 12; }
      .num { font-size: 26px; font-weight: bold; fill: #C62828; }
      .label { font-size: 12px; font-weight: bold; fill: #2C1810; text-anchor: middle; }
    </style>
  </defs>
  
  <text x="600" y="35" font-size="22" font-weight="bold" fill="#1A237E" text-anchor="middle">NARRATION — STRUCTURE EN CHAPITRES</text>

  <!-- Panel 1: Choose team -->
  <rect class="panel" x="15" y="55" width="285" height="420"/>
  <text class="num" x="30" y="85">1</text>
  <text x="157" y="83" font-size="13" font-weight="bold" fill="#1A237E">DÉBUT DE CHAPITRE</text>
  <!-- Selection screen concept -->
  <rect x="40" y="100" width="235" height="250" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="95" y="122" font-size="11" fill="#1565C0" font-weight="bold">CHOISIR TITULAIRES</text>
  <!-- Characters to select -->
  <circle cx="80" cy="170" r="18" fill="#FFD54F" stroke="#4CAF50" stroke-width="3"/>
  <text x="72" y="177" font-size="16">😊</text>
  <text x="65" y="198" font-size="8" fill="#4CAF50" font-weight="bold">✅ Titulaire</text>
  <circle cx="157" cy="170" r="18" fill="#37474F" stroke="#4CAF50" stroke-width="3"/>
  <text x="149" y="177" font-size="16">😎</text>
  <text x="142" y="198" font-size="8" fill="#4CAF50" font-weight="bold">✅ Titulaire</text>
  <circle cx="234" cy="170" r="18" fill="#FFB6C1" stroke="#4CAF50" stroke-width="3"/>
  <text x="226" y="177" font-size="16">😏</text>
  <text x="219" y="198" font-size="8" fill="#4CAF50" font-weight="bold">✅ Titulaire</text>
  <!-- Non-selected -->
  <circle cx="80" cy="260" r="16" fill="#C8E6C9" stroke="#E0E0E0" stroke-width="2" opacity="0.5"/>
  <text x="73" y="267" font-size="14" opacity="0.5">🙂</text>
  <text x="58" y="285" font-size="7" fill="#999">Non titulaire</text>
  <circle cx="157" cy="260" r="16" fill="#BBDEFB" stroke="#E0E0E0" stroke-width="2" opacity="0.5"/>
  <text x="150" y="267" font-size="14" opacity="0.5">🤓</text>
  <text x="135" y="285" font-size="7" fill="#999">Non titulaire</text>
  <!-- Arrow showing non-titulaires leave -->
  <path d="M90,290 C100,330 180,330 200,300" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="110" y="340" font-size="9" fill="#999">Vivent leur aventure</text>
  <text class="label" x="157" y="400">Choix VERROUILLÉ</text>
  <text x="157" y="418" font-size="10" fill="#666" text-anchor="middle">jusqu'au chapitre suivant</text>

  <!-- Panel 2: Playing the chapter -->
  <rect class="panel" x="310" y="55" width="285" height="420"/>
  <text class="num" x="325" y="85">2</text>
  <text x="452" y="83" font-size="13" font-weight="bold" fill="#1A237E">PENDANT LE CHAPITRE</text>
  <!-- Team A (main path) -->
  <rect x="330" y="110" width="240" height="110" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="345" y="130" font-size="11" fill="#2E7D32" font-weight="bold">ÉQUIPE A (vous)</text>
  <!-- Three characters together -->
  <circle cx="370" cy="175" r="14" fill="#FFD54F" stroke="#2C1810" stroke-width="1.5"/>
  <text x="364" y="180" font-size="12">😊</text>
  <circle cx="410" cy="175" r="14" fill="#37474F" stroke="#2C1810" stroke-width="1.5"/>
  <text x="404" y="180" font-size="12">😎</text>
  <circle cx="450" cy="175" r="14" fill="#FFB6C1" stroke="#2C1810" stroke-width="1.5"/>
  <text x="444" y="180" font-size="12">😏</text>
  <!-- Arrow down: main quest -->
  <text x="420" y="205" font-size="10" fill="#4CAF50">→ quête principale</text>
  <!-- Team B (off-screen) -->
  <rect x="330" y="240" width="240" height="80" rx="6" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="345" y="260" font-size="11" fill="#607D8B" font-weight="bold">ÉQUIPE B (hors champ)</text>
  <circle cx="370" cy="290" r="12" fill="#C8E6C9" stroke="#999" stroke-width="1.5" opacity="0.6"/>
  <text x="364" y="295" font-size="10" opacity="0.6">🙂</text>
  <circle cx="400" cy="290" r="12" fill="#BBDEFB" stroke="#999" stroke-width="1.5" opacity="0.6"/>
  <text x="394" y="295" font-size="10" opacity="0.6">🤓</text>
  <text x="430" y="295" font-size="9" fill="#999">que font-ils ? 🤔</text>
  <text class="label" x="452" y="400">2 histoires en parallèle</text>

  <!-- Panel 3: End of chapter - fork -->
  <rect class="panel" x="605" y="55" width="285" height="420"/>
  <text class="num" x="620" y="85">3</text>
  <text x="747" y="83" font-size="13" font-weight="bold" fill="#1A237E">FIN DE CHAPITRE</text>
  <!-- Fork in the road -->
  <circle cx="747" cy="140" r="25" fill="#FFD54F" opacity="0.2" stroke="#F9A825" stroke-width="2"/>
  <text x="737" y="147" font-size="16" font-weight="bold" fill="#F9A825">CH.X</text>
  <!-- Branching arrows -->
  <line x1="747" y1="165" x2="680" y2="220" stroke="#4CAF50" stroke-width="3"/>
  <line x1="747" y1="165" x2="747" y2="220" stroke="#2196F3" stroke-width="3"/>
  <line x1="747" y1="165" x2="815" y2="220" stroke="#FF9800" stroke-width="3"/>
  <!-- Options -->
  <rect x="630" y="225" width="105" height="55" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="645" y="245" font-size="9" fill="#2E7D32" font-weight="bold">Continuer A</text>
  <text x="645" y="260" font-size="8" fill="#2E7D32">même équipe</text>
  <text x="645" y="273" font-size="8" fill="#2E7D32">même histoire</text>
  <rect x="695" y="290" width="105" height="55" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
  <text x="710" y="310" font-size="9" fill="#1565C0" font-weight="bold">Basculer sur B</text>
  <text x="710" y="325" font-size="8" fill="#1565C0">B devient A</text>
  <text x="710" y="338" font-size="8" fill="#1565C0">autre point de vue</text>
  <rect x="760" y="225" width="105" height="55" rx="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="775" y="245" font-size="9" fill="#E65100" font-weight="bold">Réintégrer</text>
  <text x="775" y="260" font-size="8" fill="#E65100">B rejoint A</text>
  <text x="775" y="273" font-size="8" fill="#E65100">(s'ils acceptent)</text>
  <text class="label" x="747" y="400">MULTIPLES VOIES</text>

  <!-- Panel 4: Replay = reward -->
  <rect class="panel" x="900" y="55" width="285" height="420"/>
  <text class="num" x="915" y="85">4</text>
  <text x="1042" y="83" font-size="13" font-weight="bold" fill="#1A237E">RETOUR EN ARRIÈRE</text>
  <!-- Rewind symbol -->
  <text x="1010" y="150" font-size="40" fill="#7E57C2">⏪</text>
  <!-- Character going back to replay -->
  <circle cx="1000" cy="210" r="18" fill="#FFD54F" stroke="#2C1810" stroke-width="2"/>
  <text x="993" y="217" font-size="16">🤔</text>
  <!-- Arrow back to previous chapter -->
  <path d="M980,215 C940,220 920,250 930,280" fill="none" stroke="#7E57C2" stroke-width="2.5"/>
  <text x="920" y="275" font-size="10" fill="#7E57C2">← ch. précédent</text>
  <!-- Reward! -->
  <rect x="920" y="310" width="240" height="100" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="1040" y="335" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">🏆 RÉCOMPENSÉ !</text>
  <text x="940" y="355" font-size="10" fill="#2E7D32">✅ Jamais sanctionné</text>
  <text x="940" y="375" font-size="10" fill="#2E7D32">✅ Les parties se cumulent</text>
  <text x="940" y="395" font-size="10" fill="#2E7D32">✅ Le jeu encourage à tout voir</text>
  <text class="label" x="1042" y="450">REJOUER = BONUS</text>
</svg>